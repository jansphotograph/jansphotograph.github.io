<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Inter, sans-serif; background: #0d0d0d; color: #ffffff; }

.topbar {
  position: fixed; top: 0; left: 0; right: 0; height: 64px;
  background: #1c1c1c; border-bottom: 1px solid rgba(255,255,255,0.07);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; z-index: 300;
}
.master-badge { background: #c71e5f; color: #fff; font-size: 0.65rem; font-weight: 800; padding: 3px 8px; border-radius: 6px; }
.master-nav {
  position: fixed; top: 64px; left: 0; right: 0; height: 44px;
  background: #111; border-bottom: 1px solid rgba(255,255,255,0.07);
  display: flex; align-items: center; gap: 2px; padding: 0 16px;
  z-index: 250; overflow-x: auto;
}
.master-nav a { color: #999; text-decoration: none; font-size: 0.8rem; font-weight: 600; padding: 6px 12px; border-radius: 7px; white-space: nowrap; display: flex; align-items: center; gap: 5px; }
.master-nav a:hover { color: #fff; background: rgba(255,255,255,0.06); }
.master-nav a.active { color: #e91e8c; background: rgba(199,30,95,0.12); }
.master-nav .nav-sep { width: 1px; height: 18px; background: rgba(255,255,255,0.08); margin: 0 4px; }
.topbar-link { color: #999; text-decoration: none; font-size: 0.85rem; padding: 6px 12px; border-radius: 8px; }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 18px; border-radius: 9px; font-family: Inter, sans-serif; font-size: 0.85rem; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; text-decoration: none; }
.btn-sm { padding: 6px 12px; font-size: 0.78rem; border-radius: 7px; }
.btn-outline { background: transparent; border: 1px solid rgba(255,255,255,0.07); color: #999; }
.btn-pink { background: #c71e5f; color: #fff; }
.btn-blue { background: #3b82f6; color: #fff; }
svg { flex-shrink: 0; }
.btn svg { width: 16px; height: 16px; }

.main-content {
  display: block;
  position: relative;
  padding-top: 120px;
  padding-left: 28px;
  padding-right: 28px;
  padding-bottom: 60px;
  min-height: 100vh;
  width: 100%;
  background: transparent;
}

.page-header { margin-bottom: 24px; }
.page-header h2 { font-size: 1.6rem; font-weight: 700; color: #fff; }
.page-header p { color: #999; font-size: 0.85rem; margin-top: 4px; }

.card { background: #1c1c1c; border: 1px solid rgba(255,255,255,0.07); border-radius: 12px; padding: 24px; margin-bottom: 20px; }

.cal-view-btns { display: flex; align-items: center; border: 1px solid rgba(255,255,255,0.07); border-radius: 8px; overflow: hidden; }
.cal-view-btn { background: transparent; border: none; color: #999; padding: 6px 14px; cursor: pointer; font-family: Inter, sans-serif; font-size: 0.82rem; font-weight: 600; }
.cal-view-btn.active { background: #c71e5f; color: #fff; }
.cal-nav-btn { background: #1c1c1c; border: 1px solid rgba(255,255,255,0.07); color: #fff; border-radius: 8px; padding: 6px 12px; cursor: pointer; font-size: 1rem; }

.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
  width: 100%;
}
.cal-dow {
  text-align: center; font-size: 0.72rem; font-weight: 700;
  color: #999; text-transform: uppercase; padding: 8px 0;
}
.cal-day {
  min-height: 80px;
  border-radius: 8px;
  padding: 8px;
  border: 1px solid rgba(255,255,255,0.1);
  background: #1c1c1c;
  cursor: pointer;
  position: relative;
}
.cal-day:hover { border-color: #c71e5f; }
.cal-day.today { border-color: #e91e8c; border-width: 2px; }
.cal-day.empty { background: transparent; border-color: transparent; cursor: default; }
.day-num { font-size: 0.78rem; font-weight: 600; color: #999; display: block; margin-bottom: 4px; }
.day-events { display: flex; flex-direction: column; gap: 2px; }
.ev-pill { font-size: 0.62rem; font-weight: 600; padding: 1px 5px; border-radius: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
.ev-confirmed { background: rgba(34,197,94,0.2); color: #86efac; }
.ev-pending { background: rgba(255,255,255,0.08); color: #999; }
.ev-completed { background: rgba(59,130,246,0.2); color: #93c5fd; }
.ev-cancelled { background: rgba(239,68,68,0.1); color: #fca5a5; }

.cal-legend { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 16px; }
.cal-legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.78rem; color: #999; }

.toast { position: fixed; bottom: 28px; right: 28px; background: #1c1c1c; border: 1px solid rgba(255,255,255,0.07); border-radius: 12px; padding: 12px 20px; font-size: 0.85rem; color: #fff; z-index: 9999; opacity: 0; transform: translateY(8px); transition: all 0.25s; pointer-events: none; border-left: 3px solid #22c55e; }
.toast.show { opacity: 1; transform: translateY(0); }
.toast.error { border-left-color: #ef4444; }

.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; }
.modal-overlay.open { display: flex; }
.modal { background: #1c1c1c; border: 1px solid rgba(255,255,255,0.07); border-radius: 18px; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; padding: 32px; }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.modal-header h3 { font-size: 1.1rem; }
.modal-close { background: none; border: none; color: #999; font-size: 1.4rem; cursor: pointer; }
.field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.field label { font-size: 0.78rem; font-weight: 600; color: #999; }
.field input, .field textarea, .field select { background: #141414; border: 1px solid rgba(255,255,255,0.07); border-radius: 9px; color: #fff; font-family: Inter, sans-serif; font-size: 0.88rem; padding: 10px 14px; outline: none; width: 100%; }
.btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
.week-grid { display: grid; grid-template-columns: 60px repeat(7,1fr); min-width: 600px; border: 1px solid rgba(255,255,255,0.07); border-radius: 10px; overflow: hidden; }
</style>

async function ghPut(file, data) {
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
  const body = { message: `update ${file}`, content };
  if (state.fileSHAs[file]) body.sha = state.fileSHAs[file];
  let res = await fetch(`${GH_BASE()}/${file}`, {
    method: 'PUT',
    headers: {
      Authorization: `token ${CONFIG.GH_TOKEN}`,
      Accept: 'application/vnd.github.v3+json',
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(body)
  });

  // If we get a 409 Conflict, our SHA is stale — fetch the current one and retry once.
  if (res.status === 409) {
    try {
      const getRes = await fetch(`${GH_BASE()}/${file}`, {
        headers: { Authorization: `token ${CONFIG.GH_TOKEN}`, Accept: 'application/vnd.github.v3+json' }
      });
      if (getRes.ok) {
        const getJson = await getRes.json();
        if (getJson.sha) {
          state.fileSHAs[file] = getJson.sha;
          body.sha = getJson.sha;
          res = await fetch(`${GH_BASE()}/${file}`, {
            method: 'PUT',
            headers: {
              Authorization: `token ${CONFIG.GH_TOKEN}`,
              Accept: 'application/vnd.github.v3+json',
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(body)
          });
        }
      }
    } catch(e) { /* retry failed — return original failed response */ }
  }

  const json = await res.json();
  if (json.content) state.fileSHAs[file] = json.content.sha;
  return res.ok;
}
async function ghPutPublic(file, data) {
  const token = CONFIG.GH_TOKEN || localStorage.getItem('jans_gh_config') && JSON.parse(localStorage.getItem('jans_gh_config')).token;
  if (!token) { showToast('Configura el token de GitHub primero', 'error'); return false; }
  // First try to get the current SHA
  let sha = null;
  try {
    const getRes = await fetch(`${GH_BASE_PUBLIC()}/${file}`, {
      headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' }
    });
    if (getRes.ok) { const j = await getRes.json(); sha = j.sha; }
  } catch(e) {}
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
  const body = { message: `update ${file}`, content };
  if (sha) body.sha = sha;
  const res = await fetch(`${GH_BASE_PUBLIC()}/${file}`, {
    method: 'PUT',
    headers: {
      Authorization: `token ${token}`,
      Accept: 'application/vnd.github.v3+json',
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(body)
  });
  return res.ok;
}

function resTotal(r) {
  const base = (r.totalManual !== undefined && r.totalManual !== null && r.totalManual !== '')
    ? (parseFloat(r.totalManual) || 0)
    : resPlanPrice(r);
  const extras        = resExtrasTotal(r);
  const personasExtra = parseFloat(r.costoPersonasExtra) || 0;
  const exterior      = parseFloat(r.costoExterior)      || 0;
  return base + extras + personasExtra + exterior;
}

  try { return JSON.parse(localStorage.getItem('jans_gh_config') || '{}'); } catch(e) { return {}; }

async function fetchCalendarData() {
  const cfg = getGHConfig();
  if (cfg.owner && cfg.repo && cfg.token) {
    try {
      const r = await fetch('https://api.github.com/repos/' + cfg.owner + '/' + cfg.repo + '/contents/data/calendar.json', {
        headers: { Authorization: 'token ' + cfg.token, Accept: 'application/vnd.github.v3.json' }
      });
      if (r.ok) {
        const d = await r.json();
        state.calendar = JSON.parse(atob(d.content.replace(/\n/g,'')));
        localStorage.setItem('jans_calendar', JSON.stringify(state.calendar));
      }
    } catch(e) { console.warn('Calendar fetch error:', e); }

    try {
      const r2 = await fetch('https://api.github.com/repos/' + cfg.owner + '/' + cfg.repo + '/contents/data/quotes.json', {
        headers: { Authorization: 'token ' + cfg.token, Accept: 'application/vnd.github.v3.json' }
      });
      if (r2.ok) {
        const d2 = await r2.json();
        state.quotes = JSON.parse(atob(d2.content.replace(/\n/g,'')));
        localStorage.setItem('jans_quotes', JSON.stringify(state.quotes));
      }
    } catch(e) { console.warn('Quotes fetch error:', e); }
  }
  // Siempre renderizar aunque fallen las peticiones
  renderCalendar();
  showToast('Calendario actualizado');
}

function evClass(status) {
  return { confirmed:'ev-confirmed', postponed:'ev-postponed', cancelled:'ev-cancelled' }[status] || 'ev-pending';
}
function getEventsForDate(ds) {
  const res  = (JSON.parse(localStorage.getItem('jans_reservas')||'[]')).filter(r=>r.fecha===ds && r.status!=='deleted');
  const quot = state.quotes.filter(q=>q.sessionDate===ds);
  const evs  = [];
  res.forEach(r  => evs.push({ name: r.nombre,         plan: r.plan||'—',   hora: r.hora||'',  horaVal: r.horaVal||0, status: r.status,   type:'res'   }));
  quot.forEach(q => evs.push({ name: q.clientName,     plan: q.plan||'—',   hora: q.sessionTime||'', horaVal: parseInt((q.sessionTime||'0').split(':')[0])||0, status: q.status, type:'quote' }));
  return evs;
}

function calNext() {
  if(calView==='month') { state.calMonth++; if(state.calMonth>11){state.calMonth=0;state.calYear++;} }
  else if(calView==='week') { state.calMonth++; if(state.calMonth>11){state.calMonth=0;state.calYear++;} }
  else if(calView==='day' && calViewDay) {
    const d = new Date(calViewDay); d.setDate(d.getDate()+1);
    calViewDay = d.toISOString().split('T')[0];
    state.calYear  = d.getFullYear();
    state.calMonth = d.getMonth();
  }
  renderCalendar();
}
function calPrev() {
  if(calView==='month') { state.calMonth--; if(state.calMonth<0){state.calMonth=11;state.calYear--;} }
  else if(calView==='week') { state.calMonth--; if(state.calMonth<0){state.calMonth=11;state.calYear--;} }
  else if(calView==='day' && calViewDay) {
    const d = new Date(calViewDay); d.setDate(d.getDate()-1);
    calViewDay = d.toISOString().split('T')[0];
    state.calYear  = d.getFullYear();
    state.calMonth = d.getMonth();
  }
  renderCalendar();
}
function calGoToday() {
  const now = new Date();
  state.calYear  = now.getFullYear();
  state.calMonth = now.getMonth();
  if(calView==='day') {
    calViewDay = now.toISOString().split('T')[0];
  }
  renderCalendar();
}

  ['month','week','day'].forEach(x => {
    document.getElementById('calView'+x.charAt(0).toUpperCase()+x.slice(1)).style.display = x===v ? 'block' : 'none';
    document.getElementById('btnView'+x.charAt(0).toUpperCase()+x.slice(1)).classList.toggle('active', x===v);

async function saveCalEvent() {
  const titulo     = document.getElementById('calEvTitulo').value.trim();
  const fecha      = document.getElementById('calEvFecha').value;
  const nuevaFecha = document.getElementById('calEvNuevaFecha').value;
  const desc       = document.getElementById('calEvDesc').value.trim();
  const color      = document.querySelector('[name="calEvColor"]:checked')?.value || 'pink';
  const blockType  = document.querySelector('[name="calEvBlockType"]:checked')?.value || 'day';
  const editDs     = document.getElementById('calEvEditDs').value;

  const horaInicio = blockType === 'hours' ? parseInt(document.getElementById('calEvHoraInicio').value, 10) : null;
  const horaFin    = blockType === 'hours' ? parseInt(document.getElementById('calEvHoraFin').value,    10) : null;

  if (!titulo) { showToast('El título es obligatorio', 'error'); document.getElementById('calEvTitulo').focus(); return; }
  if (!fecha && !editDs) { showToast('La fecha es obligatoria', 'error'); document.getElementById('calEvFecha').focus(); return; }
  if (blockType === 'hours' && horaInicio >= horaFin) {
    showToast('La hora de inicio debe ser anterior a la hora de fin', 'error'); return;
  }

  const newDs = editDs ? (nuevaFecha || editDs) : fecha;

  const evObj = { type: 'event', titulo, descripcion: desc, color, blockType };
  if (blockType === 'hours') { evObj.horaInicio = horaInicio; evObj.horaFin = horaFin; }

  // If rescheduling to a different date, release the original day first
  if (editDs && newDs !== editDs) state.calendar[editDs] = 'available';

  state.calendar[newDs] = evObj;
  localStorage.setItem('jans_calendar', JSON.stringify(state.calendar));
  renderCalendar();
  closeModal('calEventFormModal');

  const ok1 = await ghPut('calendar.json', state.calendar);
  const ok2 = await ghPutPublic('calendar.json', state.calendar);

  const label = blockType === 'hours'
    ? `(${horaInicio % 12 || 12}${horaInicio < 12 ? 'AM' : 'PM'} – ${horaFin % 12 || 12}${horaFin < 12 ? 'AM' : 'PM'})`
    : '(día completo)';

  if (ok1 && ok2) {
    showToast(editDs ? (newDs !== editDs ? `Evento aplazado al ${newDs} ✓` : `Evento actualizado ${label} ✓`) : `Evento creado — bloqueado ${label} ✓`);
  } else {
    showToast('Guardado localmente — verifica GitHub en Configuración', 'error');
  }
}
async function deleteCalEvent(ds) {
  closeModal('calEventPickerModal');
  if (!ds || !state.calendar[ds] || typeof state.calendar[ds] !== 'object') return;

  const titulo = state.calendar[ds].titulo || 'este evento';
  if (!confirm(`¿Eliminar "${titulo}" (${ds}) y liberar ese día?`)) return;

  state.calendar[ds] = 'available';
  localStorage.setItem('jans_calendar', JSON.stringify(state.calendar));
  renderCalendar();

  const ok1 = await ghPut('calendar.json', state.calendar);
  const ok2 = await ghPutPublic('calendar.json', state.calendar);
  showToast(ok1 && ok2 ? `"${titulo}" eliminado — día liberado ✓` : 'Eliminado localmente — verifica GitHub', ok1 && ok2 ? 'success' : 'error');
}

  const descEl  = document.getElementById('ctxEventDesc');

  const st = state.calendar[ds];
  const hasEvent = st && typeof st === 'object' && st.type === 'event';
  infoEl.style.display = hasEvent ? 'block' : 'none';
  if (hasEvent) {
    const colorHex = { pink:'#e91e8c', blue:'#3b82f6', green:'#22c55e', amber:'#f59e0b', purple:'#a855f7' };
    const fmtH = h => { const s = h < 12 ? 'AM' : 'PM'; return `${h % 12 || 12}:00 ${s}`; };
    dotEl.style.background  = colorHex[st.color] || colorHex.pink;
    titEl.textContent       = st.titulo || 'Evento';
    const blockLabel = (!st.blockType || st.blockType === 'day')
      ? 'Día completo bloqueado'
      : `${fmtH(st.horaInicio)} – ${fmtH(st.horaFin)}`;
    descEl.innerHTML  = `<span style="color:${colorHex[st.color]||colorHex.pink};font-weight:600;font-size:0.73rem">${blockLabel}</span>${st.descripcion ? `<br>${st.descripcion}` : ''}`;
    descEl.style.display = 'block';
  }

  menu.classList.add('open');
  // Position near click, keeping menu inside viewport
  const x = Math.min(e.clientX, window.innerWidth  - 240);
  const y = Math.min(e.clientY, window.innerHeight - 220);
  menu.style.left = x + 'px';
  menu.style.top  = y + 'px';
}
function openCalCtxMenu() { console.warn('openCalCtxMenu not implemented'); }
function closeCalCtxMenu() { console.warn('closeCalCtxMenu not implemented'); }
function setCalView(v) {
  calView = v;
  ['month','week','day'].forEach(x => {
    document.getElementById('calView'+x.charAt(0).toUpperCase()+x.slice(1)).style.display = x===v ? 'block' : 'none';
    document.getElementById('btnView'+x.charAt(0).toUpperCase()+x.slice(1)).classList.toggle('active', x===v);
  });
  renderCalendar();
}
function handleCalDayClick() { console.warn('handleCalDayClick not implemented'); }
async function syncCalendarPublic() {
  showToast('Sincronizando calendario...', 'success');
  try {
    const ok = await ghPutPublic('calendar.json', state.calendar);
    if (ok) showToast('Calendario publicado ✓ — visible en index y reservas');
    else    showToast('Error al sincronizar — verifica configuración GitHub', 'error');
  } catch(e) {
    showToast('Error de conexión', 'error');
  }
}
document.addEventListener('DOMContentLoaded', () => {
  loadCalendar();
  try { allReservas = JSON.parse(localStorage.getItem('jans_reservas') || '[]'); } catch(e) { allReservas = []; }
  try { state.quotes = JSON.parse(localStorage.getItem('jans_quotes') || '[]'); } catch(e) { state.quotes = []; }
  // Renderizar inmediatamente con datos locales
  renderCalendar();
  // Luego actualizar en background (sin bloquear si falla)
  setTimeout(() => fetchCalendarData(), 500);
});
