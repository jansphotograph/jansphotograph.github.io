<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Calendario — Jans Photograph</title>
  <link rel="icon" type="image/png" sizes="32x32" href="../../images/icons/JansBlackBag.png" />
  <link rel="shortcut icon" href="../../images/icons/JansBlackBag.png" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;600;700&display=swap"/>

<style>
/* ═══════════════════════════════════════════════
   master-calendario.css — CSS consolidado
   Incluye: base + nav + estilos específicos
   ═══════════════════════════════════════════════ */

/* ═══════════════════════════════════════════════════════
   MSTR BASE CSS — compartido por todas las páginas del master
   No usa sidebar — usa topbar + subnav horizontal
   ═══════════════════════════════════════════════════════ */

/* ── Variables ── */
:root {
  --pink:    #c71e5f;
  --pink-l:  #e91e8c;
  --black:   #0d0d0d;
  --dark:    #141414;
  --panel:   #1c1c1c;
  --border:  rgba(255,255,255,0.07);
  --gray:    #666;
  --gray-l:  #999;
  --white:   #ffffff;
  --red:     #ef4444;
  --amber:   #f59e0b;
  --green:   #22c55e;
  --blue:    #3b82f6;
  --font:    'Inter', system-ui, sans-serif;
  --serif:   'Playfair Display', Georgia, serif;
  --radius:  12px;
  --topbar-h: 64px;
  --subnav-h: 48px;
}

/* ── SVG size control — global hard cap ── */
svg {
  flex-shrink: 0;
  overflow: visible;
}
/* SVGs que no están dentro de contenedores con tamaño definido — limitar */
:not(.home-card-icon):not(.stat-card):not([class*="chart"]) > svg:not([width]):not([height]) {
  width: 20px;
  height: 20px;
}
.btn svg         { width: 16px !important; height: 16px !important; flex-shrink: 0; }
.card-title svg  { color: var(--pink-l); flex-shrink: 0; width: 18px !important; height: 18px !important; }
.topbar svg      { width: 20px !important; height: 20px !important; flex-shrink: 0; }
.subnav-btn svg  { width: 15px !important; height: 15px !important; flex-shrink: 0; }
table svg        { width: 15px !important; height: 15px !important; flex-shrink: 0; }
.modal-close svg { width: 20px !important; height: 20px !important; }
.page-header svg { width: 24px !important; height: 24px !important; }
.home-card-icon svg { width: 22px !important; height: 22px !important; }

/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font);
  background: var(--black);
  color: var(--white);
  overflow-x: hidden;
}

/* ── Topbar ── */
.topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--topbar-h);
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  z-index: 300;
}

.master-badge {
  background: var(--pink);
  color: #fff;
  font-size: 0.65rem;
  font-weight: 800;
  letter-spacing: .08em;
  padding: 3px 8px;
  border-radius: 6px;
}

.topbar-link {
  color: var(--gray-l);
  text-decoration: none;
  font-size: 0.85rem;
  padding: 6px 12px;
  border-radius: 8px;
  transition: all 0.15s;
}
.topbar-link:hover { color: var(--white); background: rgba(255,255,255,0.05); }

/* ── Subnav ── */
.subnav {
  position: fixed;
  top: var(--topbar-h);
  left: 0; right: 0;
  height: var(--subnav-h);
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 0 20px;
  z-index: 200;
  overflow-x: auto;
  scrollbar-width: none;
}
.subnav::-webkit-scrollbar { display: none; }

.subnav-btn {
  background: transparent;
  border: 1px solid transparent;
  border-radius: 8px;
  color: var(--gray-l);
  font-family: var(--font);
  font-size: 0.85rem;
  font-weight: 600;
  padding: 7px 16px;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.subnav-btn:hover { background: rgba(255,255,255,0.05); color: var(--white); }
.subnav-btn.active {
  background: rgba(199,30,95,0.15);
  border-color: rgba(199,30,95,0.4);
  color: var(--pink-l);
}

/* ── Main content — sin sidebar, con subnav ── */
.main-content {
  padding-top: 136px; /* topbar(64) + master-nav(44) + espacio(28) */
  padding-left: 28px;
  padding-right: 28px;
  padding-bottom: 60px;
  min-height: 100vh;
  width: 100%;
  box-sizing: border-box;
  display: block;
}

/* Sin subnav */
.main-content.no-subnav {
  padding-top: calc(var(--topbar-h) + 28px);
}

/* ── Toast ── */
.toast {
  position: fixed;
  bottom: 28px; right: 28px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 20px;
  font-size: 0.85rem;
  color: var(--white);
  z-index: 9999;
  opacity: 0;
  transform: translateY(8px);
  transition: all 0.25s;
  pointer-events: none;
  border-left: 3px solid var(--green);
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.error { border-left-color: var(--red); }

/* ── Cards ── */
.card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 20px;
}
.card-title {
  font-size: 0.9rem;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.card-title svg { color: var(--pink-l); }

/* ── Stats grid ── */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 14px;
  margin-bottom: 20px;
}
.stat-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
}
.stat-card.pink  { border-color: rgba(199,30,95,0.3); }
.stat-card.amber { border-color: rgba(245,158,11,0.3); }
.stat-card.green { border-color: rgba(34,197,94,0.3); }
.stat-card.blue  { border-color: rgba(59,130,246,0.3); }
.stat-label { font-size: 0.72rem; color: var(--gray-l); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
.stat-value { font-size: 1.7rem; font-weight: 800; color: var(--white); line-height: 1; }
.stat-sub   { font-size: 0.72rem; color: var(--gray); margin-top: 4px; }

/* ── Page header ── */
.page-header { margin-bottom: 24px; }
.page-header h2 { font-family: var(--serif); font-size: 1.6rem; font-weight: 700; }
.page-header p  { color: var(--gray-l); font-size: 0.85rem; margin-top: 4px; }

/* ── Buttons ── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 9px 18px; border-radius: 9px;
  font-family: var(--font); font-size: 0.85rem; font-weight: 600;
  cursor: pointer; border: none; transition: all 0.15s; text-decoration: none;
}
.btn-pink    { background: var(--pink);  color: #fff; }
.btn-pink:hover  { background: var(--pink-l); }
.btn-green   { background: var(--green); color: #fff; }
.btn-amber   { background: var(--amber); color: #000; }
.btn-red     { background: var(--red);   color: #fff; }
.btn-blue    { background: var(--blue);  color: #fff; }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--gray-l); }
.btn-outline:hover { border-color: rgba(255,255,255,0.2); color: var(--white); }
.btn-ghost   { background: transparent; color: var(--gray-l); border: none; }
.btn-ghost:hover { color: var(--white); }
.btn-sm { padding: 6px 12px; font-size: 0.78rem; border-radius: 7px; }
.btn-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

/* ── Forms ── */
.field { display: flex; flex-direction: column; gap: 6px; }
.field label { font-size: 0.78rem; font-weight: 600; color: var(--gray-l); }
.field input, .field textarea, .field select {
  background: var(--dark);
  border: 1px solid var(--border);
  border-radius: 9px;
  color: var(--white);
  font-family: var(--font);
  font-size: 0.88rem;
  padding: 10px 14px;
  outline: none;
  transition: border-color 0.15s;
  width: 100%;
}
.field input:focus, .field textarea:focus, .field select:focus {
  border-color: rgba(199,30,95,0.4);
}
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

/* ── Tables ── */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
thead th {
  text-align: left; padding: 10px 12px;
  color: var(--gray-l); font-size: 0.72rem;
  text-transform: uppercase; letter-spacing: .05em;
  border-bottom: 1px solid var(--border);
}
tbody td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.04); vertical-align: middle; }
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: rgba(255,255,255,0.02); }

/* ── Badges ── */
.badge-status {
  display: inline-block; padding: 3px 9px;
  border-radius: 6px; font-size: 0.72rem; font-weight: 700;
}
.status-pending   { background: rgba(245,158,11,0.15); color: #fcd34d; }
.status-approved  { background: rgba(34,197,94,0.15);  color: #86efac; }
.status-rejected  { background: rgba(239,68,68,0.15);  color: #fca5a5; }
.status-postponed { background: rgba(139,92,246,0.15); color: #c4b5fd; }

/* ── Modals ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 1000;
  display: none; align-items: center; justify-content: center;
  padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 18px;
  width: 100%; max-width: 520px;
  max-height: 90vh;
  overflow-y: auto;
  padding: 32px;
}
.modal-flex {
  display: flex; flex-direction: column;
  padding: 0; overflow: hidden;
}
.modal-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 20px;
}
.modal-header h3 { font-family: var(--serif); font-size: 1.1rem; }
.modal-close {
  background: none; border: none; color: var(--gray-l);
  font-size: 1.4rem; cursor: pointer; line-height: 1;
}
.modal-close:hover { color: var(--white); }

/* ── Section dividers ── */
.section-divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
.section-label-sm {
  font-size: 0.7rem; font-weight: 700; color: var(--gray-l);
  text-transform: uppercase; letter-spacing: .08em; display: block; margin-bottom: 8px;
}

/* ── Responsive ── */
@media (max-width: 640px) {
  .main-content { padding-left: 16px; padding-right: 16px; }
  .form-row { grid-template-columns: 1fr; }
  .stats-grid { grid-template-columns: 1fr 1fr; }
}


/* ── Master Nav — barra de navegación debajo del header ── */
.master-nav {
  position: fixed;
  top: 64px;
  left: 0; right: 0;
  background: #111;
  border-bottom: 1px solid rgba(255,255,255,0.07);
  display: flex;
  align-items: center;
  gap: 2px;
  padding: 0 16px;
  z-index: 200;
  overflow-x: auto;
  scrollbar-width: none;
  height: 44px;
}
.master-nav::-webkit-scrollbar { display: none; }

.master-nav a {
  color: #999;
  text-decoration: none;
  font-size: 0.8rem;
  font-weight: 600;
  padding: 6px 12px;
  border-radius: 7px;
  white-space: nowrap;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 5px;
}
.master-nav a:hover { color: #fff; background: rgba(255,255,255,0.06); }
.master-nav a.active { color: #e91e8c; background: rgba(199,30,95,0.12); }
.master-nav .nav-sep {
  width: 1px; height: 18px;
  background: rgba(255,255,255,0.08);
  margin: 0 4px;
  flex-shrink: 0;
}


/* master-calendario.html */
.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
}
.cal-day {
  min-height: 72px; max-height: 108px;
  overflow: hidden;
  border-radius: 9px; padding: 6px;
  border: 1px solid var(--border);
  background: var(--panel);
  transition: all 0.15s;
  position: relative; cursor: pointer;
}
.cal-day:hover { border-color: var(--border); background: rgba(255,255,255,0.02); }
.cal-day.today  { border-color: var(--pink); }
.cal-day.other-month { opacity: 0.4; }
.cal-day.blocked { background: rgba(239,68,68,0.08); }
.day-num { font-size: 0.78rem; font-weight: 600; display: block; color: var(--gray-l); margin-bottom: 3px; }
.day-events { display: flex; flex-direction: column; gap: 2px; overflow: hidden; max-height: 60px; }
.ev-pill {
  font-size: 0.62rem; font-weight: 600; padding: 1px 5px;
  border-radius: 4px; overflow: hidden;
  text-overflow: ellipsis; white-space: nowrap;
  max-width: 100%; display: block;
}
.ev-confirmed { background: rgba(34,197,94,0.2);  color: #86efac; }
.ev-pending   { background: rgba(255,255,255,0.08); color: var(--gray-l); }
.ev-completed { background: rgba(59,130,246,0.2);  color: #93c5fd; }
.cal-view-btns { display:flex; align-items:center; border:1px solid var(--border); border-radius:8px; overflow:hidden; }
.cal-view-btn  { background:transparent; border:none; color:var(--gray-l); padding:6px 14px; cursor:pointer; font-family:var(--font); font-size:0.82rem; font-weight:600; transition:all 0.15s; }
.cal-view-btn.active { background:var(--pink); color:#fff; }
.week-grid {
  display: grid;
  grid-template-columns: 56px repeat(7, 1fr);
  min-width: 600px;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px;
  overflow: hidden;
}
/* Header row — nombre del día */
.week-header-cell {
  background: #1a1a1a;
  padding: 10px 8px;
  text-align: center;
  font-size: 0.75rem;
  font-weight: 700;
  color: #999;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  border-right: 1px solid rgba(255,255,255,0.05);
}
.week-header-cell.today-col { color: #e91e8c; }
/* Etiqueta de hora */
.week-time-label {
  font-size: 0.68rem;
  color: #555;
  padding: 6px 8px 0 6px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  border-right: 1px solid rgba(255,255,255,0.05);
  text-align: right;
  background: #141414;
}
/* Celda de hora por día */
.week-cell {
  min-height: 52px;
  padding: 3px 4px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  border-right: 1px solid rgba(255,255,255,0.05);
  cursor: pointer;
  transition: background 0.1s;
}
.week-cell:hover { background: rgba(255,255,255,0.03); }
.week-cell.today-col { background: rgba(199,30,95,0.04); }
/* Evento en vista semanal */
.week-event {
  font-size: 0.72rem;
  padding: 2px 6px;
  border-radius: 4px;
  margin-bottom: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  cursor: pointer;
}
/* Legacy */
.week-header { background:#1a1a1a; padding:8px; text-align:center; font-size:0.75rem; font-weight:700; color:#999; border-bottom:1px solid rgba(255,255,255,0.08); }
.week-slot { min-height:52px; padding:3px 4px; border-bottom:1px solid rgba(255,255,255,0.04); }
.week-time { font-size:0.68rem; color:#555; padding:4px 6px; text-align:right; border-bottom:1px solid rgba(255,255,255,0.04); }



/* Padding para header(64) + master-nav(44) */


.cal-dow {
  text-align: center;
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--gray-l);
  text-transform: uppercase;
  padding: 8px 0;
  letter-spacing: 0.05em;
}
.cal-day.empty {
  background: transparent;
  border-color: transparent;
  cursor: default;
}
.cal-legend { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 12px; }
.cal-legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.78rem; color: var(--gray-l); }
.cal-nav-btn {
  background: var(--panel); border: 1px solid var(--border);
  color: var(--white); border-radius: 8px; padding: 6px 12px;
  cursor: pointer; font-size: 1rem; transition: all 0.15s;
}
.cal-nav-btn:hover { border-color: var(--pink); color: var(--pink-l); }


/* ── Vista de día ── */
#dayTimeline {
  display: grid;
  grid-template-columns: 56px 1fr;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px;
  overflow: hidden;
}
.day-time-label {
  font-size: 0.68rem;
  color: #555;
  padding: 14px 8px 0 6px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  background: #141414;
  text-align: right;
}
.day-slot {
  min-height: 56px;
  padding: 6px 8px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  cursor: pointer;
  transition: background 0.1s;
}
.day-slot:hover { background: rgba(255,255,255,0.03); }
.day-event {
  background: rgba(199,30,95,0.15);
  border-left: 3px solid #e91e8c;
  border-radius: 6px;
  padding: 8px 12px;
  margin-bottom: 6px;
}
.de-time { font-size: 0.7rem; color: #e91e8c; font-weight: 700; margin-bottom: 2px; }
.de-name { font-size: 0.88rem; font-weight: 700; color: #fff; }
.de-plan { font-size: 0.78rem; color: #999; margin-top: 2px; }

</style>
</head>

async function syncCalendarFromSupabase() {
  if (!sbClient) return;
  try {
    const { data, error } = await sbClient.from('calendario').select('*').order('fecha', { ascending: true });
    if (error) { console.error('syncCalendarFromSupabase error:', error); return; }
    if (!data || data.length === 0) { console.log('syncCalendarFromSupabase: sin datos'); return; }
    console.log('syncCalendarFromSupabase: cargando', data.length, 'eventos', data.map(r=>r.fecha));
    // Reconstruir state.calendar desde Supabase — es la fuente de verdad
    const cal = {};
    data.forEach(row => {
      if (!row.fecha) return;
      cal[row.fecha] = {
        type:        'event',  // siempre 'event' — renderCalendar filtra por este valor
        titulo:      row.titulo || '',
        descripcion: row.notas || '',
        color:       row.color || 'pink',
        blockType:   row.block_type || 'day',
        horaInicio:  row.hora_inicio != null ? parseInt(row.hora_inicio) : null,
        horaFin:     row.hora_fin    != null ? parseInt(row.hora_fin)    : null,
        status:      row.status || 'evento',
      };
    });
    // Mergear: Supabase tiene prioridad sobre localStorage para las fechas que conoce
    // pero preservar eventos locales que aún no están en Supabase
    let localCal = {};
    try { localCal = JSON.parse(localStorage.getItem('jans_calendar') || '{}'); } catch(e) {}
    const merged = Object.assign({}, localCal, cal); // cal (Supabase) sobreescribe local en conflictos
    state.calendar = merged;
    localStorage.setItem('jans_calendar', JSON.stringify(merged));
    renderCalendar();
  } catch(e) { console.warn('syncCalendarFromSupabase:', e); }
}

async function sbUpsert(tabla, datos) {
  if (!sbClient) { console.warn('sbClient no disponible'); return false; }
  try {
    const { error } = await sbClient.from(tabla).upsert(
      Array.isArray(datos) ? datos : [datos],
      { onConflict: 'id' }
    );
    if (error) { console.error(`sbUpsert ${tabla}:`, error); return false; }
    return true;
  } catch(e) { console.error(`sbUpsert ${tabla}:`, e); return false; }
}

async function sbDelete(tabla, id) {
  if (!sbClient) return false;
  try {
    const { error } = await sbClient.from(tabla).delete().eq('id', id);
    return !error;
  } catch(e) { return false; }
}

async function sbGetAll(tabla, order='created_at') {
  if (!sbClient) return null;
  try {
    const { data, error } = await sbClient.from(tabla).select('*').order(order);
    if (error) return null;
    return data;
  } catch(e) { return null; }
}

async function sbSetConfig(clave, valor) {
  if (!sbClient) return false;
  try {
    const { error } = await sbClient.from('config_sitio').upsert(
      [{ clave, valor: JSON.stringify(valor), updated_at: new Date().toISOString() }],
      { onConflict: 'clave' }
    );
    return !error;
  } catch(e) { return false; }
}

async function sbGetConfig(clave) {
  if (!sbClient) return null;

    const { data, error } = await sbClient.from('config_sitio').select('valor').eq('clave', clave).single();

}

function loadReservasLocal() {
  try {
    const raw = localStorage.getItem('jans_reservas');
    if (!raw) { allReservas = []; return; }
    // Intentar parsear (puede ser JSON plano o datos encriptados)
    try { allReservas = JSON.parse(raw); } catch(e) { allReservas = []; }
  } catch(e) { allReservas = []; }
  let changed = false;
  allReservas.forEach(r => {
    if (r.abono === undefined) { r.abono = 0; changed = true; }
  });
  if (changed) localStorage.setItem('jans_reservas', JSON.stringify(allReservas));
}
function resStatusClass(s) {
  return { pending:'status-pending', confirmed:'status-approved', completed:'status-approved', declined:'status-rejected', cancelled:'status-rejected', postponed:'status-postponed' }[s] || '';
}
function resStatusLabel(s) {
  return { pending:'Pendiente', confirmed:'Confirmada', completed:'Completada', declined:'Declinada', cancelled:'Cancelada', deleted:'Eliminada', postponed:'Aplazada' }[s] || s;
}
function getEventsForDate(ds) {
  const res  = (JSON.parse(localStorage.getItem('jans_reservas')||'[]')).filter(r=>r.fecha===ds && r.status!=='deleted');
  const quot = state.quotes.filter(q=>q.sessionDate===ds);
  const evs  = [];
  res.forEach(r  => evs.push({ name: r.nombre,         plan: r.plan||'—',   hora: r.hora||'',  horaVal: r.horaVal||0, status: r.status,   type:'res'   }));
  quot.forEach(q => evs.push({ name: q.clientName,     plan: q.plan||'—',   hora: q.sessionTime||'', horaVal: parseInt((q.sessionTime||'0').split(':')[0])||0, status: q.status, type:'quote' }));
  return evs;
}
function evClass(status) {
  return { confirmed:'ev-confirmed', postponed:'ev-postponed', cancelled:'ev-cancelled' }[status] || 'ev-pending';
}
function renderCalendar() {
  try {
    const todayStr = new Date().toISOString().split('T')[0];
    if(calView==='month')  renderMonthView(todayStr);
    else if(calView==='week') renderWeekView(todayStr);
    else if(calView==='day')  renderDayView(todayStr);
    // Verificar que se renderizó
    const g = document.getElementById('calGrid');
    if(g && g.children.length === 0) {
      // Forzar renderizado básico
      g.innerHTML = '<div style="color:#999;padding:20px;grid-column:span 7">Cargando calendario...</div>';
      setTimeout(() => {
        g.innerHTML = '';
        renderMonthView(new Date().toISOString().split('T')[0]);
      }, 100);
    }
  } catch(err) {
    console.error('renderCalendar error:', err);
    const g = document.getElementById('calGrid');
    if(g) g.innerHTML = '<div style="color:#ef4444;padding:20px;grid-column:span 7">Error: ' + err.message + '</div>';
  }
}
function renderMonthView(todayStr) {
  document.getElementById('calMonthLabel').textContent = MONTHS_ES[state.calMonth] + ' ' + state.calYear;
  document.getElementById('calSubtitle').textContent = 'Vista mensual';
  const g = document.getElementById('calGrid');
  g.innerHTML = '';
  DAYS_ES.forEach(d => { const el=document.createElement('div'); el.className='cal-dow'; el.textContent=d; g.appendChild(el); });
  const firstDay    = new Date(state.calYear, state.calMonth, 1).getDay();
  const daysInMonth = new Date(state.calYear, state.calMonth+1, 0).getDate();
  for(let i=0;i<firstDay;i++){ const el=document.createElement('div'); el.className='cal-day empty'; g.appendChild(el); }

  for(let d=1;d<=daysInMonth;d++) {
    const ds  = state.calYear+'-'+String(state.calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const st  = state.calendar[ds];
    const evs = getEventsForDate(ds);
    const el  = document.createElement('div');
    el.className = 'cal-day';
    if(ds===todayStr) el.classList.add('today');

    // st can be 'booked', 'available', or an event object {type:'event', titulo, color, ...}
    if (st && typeof st === 'object' && st.type === 'event') {
      el.classList.add('booked', 'cal-event', `ev-${st.color || 'pink'}`);
      el.title = st.titulo || 'Evento';
    } else if(st==='booked')    { el.classList.add('booked'); }
      else if(st==='available') { el.classList.add('available'); }

    // Reserva event pills (max 3)
    const pills = evs.slice(0,3).map(e =>
      `<div class="ev-pill ${evClass(e.status)}" title="${e.name} — ${e.plan}">${e.name.split(' ')[0]}</div>`
    ).join('');
    const more  = evs.length > 3 ? `<div class="ev-pill ev-pending">+${evs.length-3}</div>` : '';

    // Calendar event label (if it's an event object, show the title below the day number)
    const evLabel = (st && typeof st === 'object' && st.type === 'event')
      ? `<div style="font-size:0.6rem;color:var(--ev-color,var(--pink));overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%;line-height:1.1;margin-top:1px">${st.titulo||'Evento'}</div>`
      : '';

    el.innerHTML = `<span class="day-num">${d}</span>${evLabel}<div class="day-events">${pills}${more}</div>`;
    el.addEventListener('click', e => openCtxMenu(e, ds));
    g.appendChild(el);
  }
}
function renderWeekView(todayStr) {
  // Find Sunday of current week relative to today or calYear/calMonth
  const refDate   = new Date(state.calYear, state.calMonth, state.calDay || 1);
  const dayOfWeek = refDate.getDay(); // 0=Sun
  const monday    = new Date(refDate); monday.setDate(refDate.getDate() - dayOfWeek);
  const days = Array.from({length:7}, (_,i) => { const d=new Date(monday); d.setDate(monday.getDate()+i); return d; });
  const startStr = days[0].toISOString().split('T')[0];
  const endStr   = days[6].toISOString().split('T')[0];
  document.getElementById('calMonthLabel').textContent = MONTHS_ES[days[0].getMonth()] + ' ' + days[0].getDate() + ' – ' + MONTHS_ES[days[6].getMonth()] + ' ' + days[6].getDate() + ', ' + days[6].getFullYear();
  document.getElementById('calSubtitle').textContent = 'Vista semanal';

  const g = document.getElementById('weekGrid'); g.innerHTML = '';

  // Header row
  const cornerEl = document.createElement('div'); cornerEl.className='week-header-cell'; g.appendChild(cornerEl);
  days.forEach(d => {
    const ds  = d.toISOString().split('T')[0];
    const el  = document.createElement('div');
    el.className = 'week-header-cell' + (ds===todayStr?' today-col':'');
    el.innerHTML = DAYS_ES[d.getDay()] + '<br><strong style="font-size:0.95rem">' + d.getDate() + '</strong>';
    g.appendChild(el);
  });

  // Hour rows
  HOURS_CAL.forEach((h, hi) => {
    const tlEl = document.createElement('div'); tlEl.className='week-time-label'; tlEl.style.cssText='display:flex;align-items:flex-start;padding:4px 8px 0 0;border-bottom:1px solid rgba(255,255,255,0.05)'; tlEl.textContent=HOUR_LABELS[hi]; g.appendChild(tlEl);
    days.forEach(d => {
      const ds  = d.toISOString().split('T')[0];
      const evs = getEventsForDate(ds).filter(e=>e.horaVal===h);
      const cell= document.createElement('div');
      cell.className = 'week-cell' + (ds===todayStr?' today-col':'');
      evs.forEach(e => {
        const pill = document.createElement('div');
        pill.className = 'week-event';
        pill.style.cssText = 'background:'+evBg(e.status)+';color:'+evColor(e.status)+(e.status==='cancelled'?';text-decoration:line-through':'');
        pill.textContent = e.name.split(' ')[0] + (e.plan ? ' · ' + e.plan.substring(0,10) : '');
        pill.title = e.name + ' — ' + e.plan + ' @ ' + e.hora;
        cell.appendChild(pill);
      });
      cell.addEventListener('click', ev => openCtxMenu(ev, ds));
      g.appendChild(cell);
    });
  });
}
function renderDayView(todayStr) {
  if(!calViewDay) calViewDay = todayStr;
  const [y,m,d] = calViewDay.split('-');
  const dateObj  = new Date(parseInt(y), parseInt(m)-1, parseInt(d));
  document.getElementById('calMonthLabel').textContent = DAYS_ES[dateObj.getDay()] + ', ' + parseInt(d) + ' de ' + MONTHS_ES[parseInt(m)-1] + ' ' + y;
  document.getElementById('calSubtitle').textContent = 'Vista diaria';

  const evs = getEventsForDate(calViewDay);
  const tl  = document.getElementById('dayTimeline'); tl.innerHTML = '';

  // ── Calendar event info banner (shown when the day has a scheduled event) ──
  const daySt = state.calendar[calViewDay];
  if (daySt && typeof daySt === 'object' && daySt.type === 'event') {
    const colorHex = { pink:'#e91e8c', blue:'#3b82f6', green:'#22c55e', amber:'#f59e0b', purple:'#a855f7' };
    const evColor  = colorHex[daySt.color] || colorHex.pink;
    const fmtH = h => { const s = h < 12 ? 'AM' : 'PM'; return `${h % 12 || 12}:00 ${s}`; };
    const blockLabel = (!daySt.blockType || daySt.blockType === 'day')
      ? 'Día completo bloqueado'
      : `Horas bloqueadas: ${fmtH(daySt.horaInicio)} – ${fmtH(daySt.horaFin)}`;
    const banner   = document.createElement('div');
    banner.style.cssText = `grid-column:1/-1;background:${evColor}18;border:1px solid ${evColor}44;border-radius:10px;padding:14px 18px;margin-bottom:14px;display:flex;align-items:flex-start;gap:12px`;
    banner.innerHTML = `
      <div style="width:36px;height:36px;border-radius:10px;background:${evColor}25;display:flex;align-items:center;justify-content:center;flex-shrink:0">
        <svg viewBox="0 0 24 24" fill="none" stroke="${evColor}" stroke-width="2" width="18" height="18"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      </div>
      <div style="flex:1;min-width:0">
        <div style="font-size:0.7rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:${evColor};margin-bottom:3px">Evento del día</div>
        <div style="font-weight:700;font-size:1rem;color:var(--white);margin-bottom:4px">${daySt.titulo || 'Evento'}</div>
        <div style="font-size:0.78rem;color:${evColor};font-weight:600;margin-bottom:${daySt.descripcion ? '4px' : '0'}">${blockLabel}</div>
        ${daySt.descripcion ? `<div style="font-size:0.82rem;color:var(--gray-l);line-height:1.5">${daySt.descripcion}</div>` : ''}
      </div>
      <button onclick="openCalEventEdit('${calViewDay}')" style="background:none;border:1px solid ${evColor}55;border-radius:8px;color:${evColor};font-family:var(--font);font-size:0.76rem;font-weight:600;padding:6px 12px;cursor:pointer;white-space:nowrap;flex-shrink:0">✏ Editar</button>
      <button onclick="openCalEventDeleteDirect('${calViewDay}')" style="background:none;border:1px solid rgba(239,68,68,0.3);border-radius:8px;color:#fca5a5;font-family:var(--font);font-size:0.76rem;font-weight:600;padding:6px 12px;cursor:pointer;white-space:nowrap;flex-shrink:0;margin-left:6px">✕ Eliminar</button>`;
    tl.appendChild(banner);
  }

  HOURS_CAL.forEach((h, hi) => {
    const tlEl = document.createElement('div'); tlEl.className='day-time-label'; tlEl.style.cssText='padding-top:14px;'; tlEl.textContent=HOUR_LABELS[hi]; tl.appendChild(tlEl);
    const cell = document.createElement('div'); cell.className='day-slot hour-block';
    const slotEvs = evs.filter(e=>e.horaVal===h);
    slotEvs.forEach(e => {
      const ev = document.createElement('div');
      ev.className = 'day-event';
      ev.style.cssText = 'background:'+evBg(e.status)+';color:'+evColor(e.status)+(e.status==='cancelled'?';text-decoration:line-through':'');
      ev.innerHTML = '<div class="de-time">'+e.hora+'</div><div class="de-name">'+e.name+'</div><div class="de-plan">'+e.plan+'</div>';
      cell.appendChild(ev);
    });
    tl.appendChild(cell);
  });

  // If no reservas/quotes show contextual message
  if(!evs.length) {
    const noEvEl = document.createElement('div');
    noEvEl.style.cssText = 'grid-column:2;padding:20px;color:var(--gray);font-size:0.88rem;';
    const daySt2 = state.calendar[calViewDay];
    const hasCalEvent = daySt2 && typeof daySt2 === 'object' && daySt2.type === 'event';
    noEvEl.textContent = hasCalEvent
      ? 'Día reservado para el evento — sin solicitudes de clientes.'
      : 'Sin reservas ni cotizaciones para este día.';
    tl.appendChild(noEvEl);
  }
}
function calNext() {
  if(calView==='month') { state.calMonth++; if(state.calMonth>11){state.calMonth=0;state.calYear++;} }
  else if(calView==='week') {
    const d = new Date(state.calYear, state.calMonth, state.calDay||1);
    d.setDate(d.getDate() + 7);
    state.calYear = d.getFullYear(); state.calMonth = d.getMonth(); state.calDay = d.getDate();
  }
  else if(calView==='day' && calViewDay) {
    const d = new Date(calViewDay); d.setDate(d.getDate()+1);
    calViewDay = d.toISOString().split('T')[0];
    state.calYear  = d.getFullYear();
    state.calMonth = d.getMonth();
  }
  renderCalendar();
}
function calPrev() {
  if(calView==='month') { state.calMonth--; if(state.calMonth<0){state.calMonth=11;state.calYear--;} }
  else if(calView==='week') {
    const d = new Date(state.calYear, state.calMonth, state.calDay||1);
    d.setDate(d.getDate() - 7);
    state.calYear = d.getFullYear(); state.calMonth = d.getMonth(); state.calDay = d.getDate();
  }
  else if(calView==='day' && calViewDay) {
    const d = new Date(calViewDay); d.setDate(d.getDate()-1);
    calViewDay = d.toISOString().split('T')[0];
    state.calYear  = d.getFullYear();
    state.calMonth = d.getMonth();
  }
  renderCalendar();
}
function calGoToday() {
  const now = new Date();
  state.calYear  = now.getFullYear();
  state.calMonth = now.getMonth();
  if(calView==='day') {
    calViewDay = now.toISOString().split('T')[0];
  }
  renderCalendar();
}
function setCalView(v) {
  calView = v;
  ['month','week','day'].forEach(x => {
    document.getElementById('calView'+x.charAt(0).toUpperCase()+x.slice(1)).style.display = x===v ? 'block' : 'none';
    document.getElementById('btnView'+x.charAt(0).toUpperCase()+x.slice(1)).classList.toggle('active', x===v);
  });
  renderCalendar();
}
function openCalEventModal() {
  openModal('calEventActionModal');
}

// ── Editar evento desde vista de día ──
function openCalEventEdit(ds) {
  const ev = state.calendar[ds];
  if (!ev || typeof ev !== 'object') return;

  // Rellenar el formulario con los datos del evento
  document.getElementById('calEvTitulo').value  = ev.titulo || '';
  document.getElementById('calEvFecha').value   = ds;
  document.getElementById('calEvDesc').value    = ev.descripcion || '';
  document.getElementById('calEvEditDs').value  = ds;

  // Color
  const colorRadio = document.querySelector('[name="calEvColor"][value="' + (ev.color||'pink') + '"]');
  if (colorRadio) colorRadio.checked = true;

  // Tipo de bloqueo
  const blockRadio = document.querySelector('[name="calEvBlockType"][value="' + (ev.blockType||'day') + '"]');
  if (blockRadio) blockRadio.checked = true;

  // Horas si aplica
  if (ev.blockType === 'hours') {
    const ini = document.getElementById('calEvHoraInicio');
    const fin = document.getElementById('calEvHoraFin');
    if (ini && ev.horaInicio != null) ini.value = ev.horaInicio;
    if (fin && ev.horaFin    != null) fin.value = ev.horaFin;
  }

  openModal('calEventFormModal');
  initBlockTypeUI();
}

// ── Eliminar evento desde vista de día ──
async function openCalEventDeleteDirect(ds) {
  if (!confirm('¿Eliminar este evento del ' + ds + '?')) return;
  if (sbClient) await sbClient.from('calendario').delete().eq('fecha', ds);
  // Eliminar del estado local
  delete state.calendar[ds];
  localStorage.setItem('jans_calendar', JSON.stringify(state.calendar));
  renderCalendar();
  // Si estamos en vista día, actualizar la vista
  if (typeof renderDayView === 'function') renderDayView();
  else if (typeof renderCalView === 'function') renderCalView();
  showToast('Evento eliminado ✓');
}

function onCalEvBlockTypeChange() {
  const val = document.querySelector('[name="calEvBlockType"]:checked')?.value || 'day';
  const hoursField = document.getElementById('calEvHoursField');
  const dayLabel   = document.getElementById('calEvBlockDayLabel');
  const hoursLabel = document.getElementById('calEvBlockHoursLabel');

  // Mostrar/ocultar selector de horas
  if (hoursField) hoursField.style.display = val === 'hours' ? 'block' : 'none';

  // Estilos activo/inactivo en los botones
  const activeStyle   = 'background:rgba(199,30,95,0.15);color:var(--pink-l,#e91e8c)';
  const inactiveStyle = 'background:transparent;color:var(--gray-l,#999)';

  if (dayLabel)   dayLabel.style.cssText   += ';' + (val === 'day'   ? activeStyle : inactiveStyle);
  if (hoursLabel) hoursLabel.style.cssText += ';' + (val === 'hours' ? activeStyle : inactiveStyle);
}

// Inicializar estado visual al abrir el modal
function initBlockTypeUI() {
  onCalEvBlockTypeChange();
}

async function saveCalEvent() {
  const titulo     = document.getElementById('calEvTitulo').value.trim();
  const fecha      = document.getElementById('calEvFecha').value;
  const nuevaFecha = document.getElementById('calEvNuevaFecha').value;
  const desc       = document.getElementById('calEvDesc').value.trim();
  const color      = document.querySelector('[name="calEvColor"]:checked')?.value || 'pink';
  const blockType  = document.querySelector('[name="calEvBlockType"]:checked')?.value || 'day';
  const editDs     = document.getElementById('calEvEditDs').value;

  const horaInicio = blockType === 'hours' ? parseInt(document.getElementById('calEvHoraInicio').value, 10) : null;
  const horaFin    = blockType === 'hours' ? parseInt(document.getElementById('calEvHoraFin').value,    10) : null;

  if (!titulo) { showToast('El título es obligatorio', 'error'); document.getElementById('calEvTitulo').focus(); return; }
  if (!fecha && !editDs) { showToast('La fecha es obligatoria', 'error'); document.getElementById('calEvFecha').focus(); return; }
  if (blockType === 'hours' && horaInicio >= horaFin) {
    showToast('La hora de inicio debe ser anterior a la hora de fin', 'error'); return;
  }

  const newDs = editDs ? (nuevaFecha || editDs) : fecha;

  const evObj = { type: 'event', titulo, descripcion: desc, color, blockType };
  if (blockType === 'hours') { evObj.horaInicio = horaInicio; evObj.horaFin = horaFin; }

  // If rescheduling to a different date, release the original day first
  if (editDs && newDs !== editDs) state.calendar[editDs] = 'available';

  state.calendar[newDs] = evObj;
  localStorage.setItem('jans_calendar', JSON.stringify(state.calendar));
  renderCalendar();
  closeModal('calEventFormModal');

  // Guardar en Supabase — id = fecha para garantizar un solo registro por día
  const sbOk = await sbUpsert('calendario', {
    id: newDs,
    fecha: newDs,
    titulo,
    notas: desc,
    color,
    block_type: blockType,
    hora_inicio: horaInicio,
    hora_fin: horaFin,
    status: 'evento'
  });
  if (!sbOk) console.warn('No se pudo guardar evento en Supabase');

  const label = blockType === 'hours'
    ? `(${horaInicio % 12 || 12}${horaInicio < 12 ? 'AM' : 'PM'} – ${horaFin % 12 || 12}${horaFin < 12 ? 'AM' : 'PM'})`
    : '(día completo)';

  showToast(editDs ? (newDs !== editDs ? `Evento aplazado al ${newDs} ✓` : `Evento actualizado ${label} ✓`) : `Evento creado — bloqueado ${label} ✓`);
}
async function deleteCalEvent(ds) {
  closeModal('calEventPickerModal');
  if (!ds || !state.calendar[ds] || typeof state.calendar[ds] !== 'object') return;

  const titulo = state.calendar[ds].titulo || 'este evento';
  if (!confirm(`¿Eliminar "${titulo}" (${ds}) y liberar ese día?`)) return;

  delete state.calendar[ds];
  localStorage.setItem('jans_calendar', JSON.stringify(state.calendar));
  renderCalendar();

  if (sbClient) await sbClient.from('calendario').delete().eq('fecha', ds);
  showToast(`"${titulo}" eliminado — día liberado ✓`);
}
function openCalEventPicker(mode) {
  const eventDays = Object.entries(state.calendar)
    .filter(([, v]) => v && typeof v === 'object' && v.type === 'event')
    .sort(([a],[b]) => a.localeCompare(b));

  if (!eventDays.length) {
    showToast('No hay eventos en el calendario todavía', 'error');
    return;
  }

  const isDelete = mode === 'delete';
  document.getElementById('calPickerTitle').textContent = isDelete ? 'Eliminar Evento' : 'Seleccionar Evento para Editar';

  const colorHex = { pink:'#e91e8c', blue:'#3b82f6', green:'#22c55e', amber:'#f59e0b', purple:'#a855f7' };
  document.getElementById('calEventPickerList').innerHTML = eventDays.map(([ds, ev]) => {
    const fechaFmt = new Date(ds + 'T00:00:00').toLocaleDateString('es-PA', { weekday:'short', day:'numeric', month:'long', year:'numeric' });
    const color = colorHex[ev.color] || colorHex.pink;
    return `
      <div onclick="${isDelete ? `deleteCalEvent('${ds}')` : `openCalEventForm('${ds}')`}"
        style="display:flex;align-items:center;gap:12px;background:var(--dark);border:1px solid var(--border);border-radius:10px;padding:12px 16px;cursor:pointer;transition:all 0.18s"
        onmouseover="this.style.borderColor='rgba(233,30,140,0.35)'" onmouseout="this.style.borderColor='var(--border)'">
        <div style="width:12px;height:12px;border-radius:50%;background:${color};flex-shrink:0"></div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:700;font-size:0.9rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${ev.titulo || 'Evento'}</div>
          <div style="font-size:0.75rem;color:var(--gray-l)">${fechaFmt}</div>
          ${ev.descripcion ? `<div style="font-size:0.73rem;color:var(--gray);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${ev.descripcion}</div>` : ''}
        </div>
        <span style="color:${isDelete ? '#fca5a5' : 'var(--pink-l)'};font-size:0.8rem;font-weight:600;flex-shrink:0">${isDelete ? 'Eliminar →' : 'Editar →'}</span>
      </div>`;
  }).join('');

  openModal('calEventPickerModal');
}

</script>
