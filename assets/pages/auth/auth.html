<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acceso — Jans Photograph</title>
  <link rel="icon" type="image/png" href="../../images/icons/JansBlackBag.png" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink:   #c71e5f;
      --pink-l: #e91e8c;
      --black:  #0d0d0d;
      --dark:   #141414;
      --panel:  #1c1c1c;
      --border: rgba(255,255,255,0.07);
      --gray:   #666;
      --gray-l: #999;
      --white:  #ffffff;
      --red:    #ef4444;
      --font:   'Inter', system-ui, sans-serif;
      --serif:  'Playfair Display', Georgia, serif;
      --radius: 12px;
      --shadow: 0 8px 32px rgba(0,0,0,0.45);
    }

    html, body {
      height: 100%;
      background: radial-gradient(ellipse at 50% 40%, rgba(199,30,95,0.12) 0%, transparent 65%), var(--black);
      color: var(--white);
      font-family: var(--font);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .login-card {
      width: 100%;
      max-width: 400px;
      margin: 24px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 40px;
      box-shadow: var(--shadow);
      animation: fadeUp 0.35s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .login-logo {
      text-align: center;
      margin-bottom: 36px;
    }
    .login-logo img {
      height: 60px;
      width: auto;
      margin: 0 auto 14px;
      display: block;
    }
    .login-logo h1 {
      font-family: var(--serif);
      font-size: 1.45rem;
      color: var(--white);
    }
    .login-logo h1 span { color: var(--pink-l); }
    .login-logo p {
      font-size: 0.75rem;
      color: var(--gray-l);
      margin-top: 5px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--gray-l);
      margin-bottom: 8px;
    }
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      background: var(--dark);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--white);
      font-size: 0.95rem;
      font-family: var(--font);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-group input:focus {
      border-color: var(--pink);
      box-shadow: 0 0 0 3px rgba(199,30,95,0.12);
    }

    .login-error {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 9px;
      padding: 11px 15px;
      font-size: 0.84rem;
      color: #fca5a5;
      margin-bottom: 18px;
      display: none;
      align-items: center;
      gap: 8px;
    }
    .login-error.show { display: flex; }

    .btn-login {
      width: 100%;
      padding: 13px;
      background: var(--pink);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font);
      transition: background 0.2s, transform 0.15s, opacity 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-login:hover   { background: var(--pink-l); transform: translateY(-1px); }
    .btn-login:active  { transform: translateY(0); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .btn-login .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 24px;
      font-size: 0.8rem;
      color: var(--gray);
      text-decoration: none;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--gray-l); }
    .back-link svg { vertical-align: middle; margin-right: 4px; }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="login-logo">
      <img src="../../images/icons/Janssocialmedialogo.png" alt="Jans Photograph Logo" />
      <h1>Jans <span>Photograph</span></h1>
      <p>Panel de Administración</p>
    </div>

    <div class="login-error" id="loginError">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      Usuario o contraseña incorrectos.
    </div>

    <div class="form-group">
      <label>Usuario</label>
      <input type="text" id="loginUser" placeholder="Usuario" autocomplete="username" />
    </div>

    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password" />
    </div>

    <button class="btn-login" id="loginBtn" onclick="handleLogin()">
      <div class="spinner" id="loginSpinner"></div>
      <span id="loginBtnText">Ingresar</span>
    </button>

    <a class="back-link" href="../../../index.html">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      Volver al inicio
    </a>
  </div>

  <script>
    // ═══════════════════════════════════════════
    //  JANS AUTH — Secure login
    //  - SHA-256 password hashing (WebCrypto API)
    //  - Credentials stored hashed in Supabase (never in source code)
    //  - Rate limiting SHARED across all devices via Supabase
    //    (max 5 attempts / 15 min, enforced server-side, not per-browser)
    //  - Input sanitization (strip HTML/script)
    //  - Timing-safe comparison via hash
    //  - No plaintext credentials in memory
    // ═══════════════════════════════════════════

    const SESSION_KEY  = 'jans_master_auth';
    const MAX_ATTEMPTS = 5;
    const LOCK_MS      = 15 * 60 * 1000; // 15 minutes

    const SUPABASE_URL = 'https://qwwotzscuwnduzlralew.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_kiy_NJVZUEYTcNkzPDUdWA_7zpTL99g';
    let sbClient = null;
    try {
      if (window.supabase && typeof window.supabase.createClient === 'function') {
        sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      }
    } catch(e) {
      console.warn('No se pudo inicializar Supabase:', e);
    }

    // Redirect if already authenticated
    if (sessionStorage.getItem(SESSION_KEY) === 'true') {
      window.location.replace('../master.html');
    }

    // ── SHA-256 via WebCrypto (no external libs needed) ──
    async function sha256(text) {
      const buf  = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
    }

    // ── Sanitize input — strip tags and limit length ──
    function sanitize(str) {
      return String(str)
        .replace(/[<>"'`;&\\]/g, '')  // strip injection chars
        .trim()
        .slice(0, 128);                   // max 128 chars
    }

    // ── Shared rate limiter — backed by Supabase so the lock applies across
    //    ALL devices, not just the browser that failed. Falls back to a local
    //    in-memory-only check (no persistence) if Supabase is unreachable,
    //    so the login form never breaks outright — it just loses the shared lock. ──
    async function getRateState() {
      if (!sbClient) return { count: 0, locked_until: null };
      try {
        const { data, error } = await sbClient
          .from('login_attempts')
          .select('count,locked_until')
          .eq('id', 'master_login')
          .single();
        if (error || !data) return { count: 0, locked_until: null };
        return data;
      } catch(e) {
        return { count: 0, locked_until: null };
      }
    }

    function isLocked(state) {
      if (!state.locked_until) return false;
      return new Date(state.locked_until).getTime() > Date.now();
    }

    function remainingLockMinutes(state) {
      if (!state.locked_until) return 0;
      const ms = new Date(state.locked_until).getTime() - Date.now();
      return Math.max(0, Math.ceil(ms / 60000));
    }

    async function recordFailedAttempt(state) {
      if (!sbClient) return;
      const newCount = (state.count || 0) + 1;
      const lockedUntil = newCount >= MAX_ATTEMPTS
        ? new Date(Date.now() + LOCK_MS).toISOString()
        : state.locked_until || null;
      try {
        await sbClient.from('login_attempts').update({
          count: newCount,
          locked_until: lockedUntil,
          updated_at: new Date().toISOString(),
        }).eq('id', 'master_login');
      } catch(e) { /* fail silently — worst case, rate limiting is temporarily soft */ }
      return { count: newCount, locked_until: lockedUntil };
    }

    async function resetAttempts() {
      if (!sbClient) return;
      try {
        await sbClient.from('login_attempts').update({
          count: 0,
          locked_until: null,
          updated_at: new Date().toISOString(),
        }).eq('id', 'master_login');
      } catch(e) { /* non-fatal */ }
    }

    // ── Get stored credential hashes from Supabase ──
    // Credentials live in Supabase, hashed — never in this file's source code.
    // Falls back to a baked-in default ONLY if Supabase is completely unreachable,
    // so the Master never becomes totally inaccessible due to a network hiccup.
    async function getStoredHashes() {
      if (sbClient) {
        try {
          const { data, error } = await sbClient
            .from('master_credentials')
            .select('user_hash,pass_hash')
            .eq('id', 'master_login')
            .single();
          if (!error && data && data.user_hash && data.pass_hash) {
            return { userHash: data.user_hash, passHash: data.pass_hash };
          }
        } catch(e) { /* fall through to local override / default below */ }
      }
      // Local override (set manually via console if ever needed) takes next priority
      const override = JSON.parse(localStorage.getItem('jans_auth_override') || 'null');
      if (override && override.userHash && override.passHash) {
        return { userHash: override.userHash, passHash: override.passHash };
      }
      // Last-resort default (admin / jans2025) — only reached if Supabase is down
      return {
        userHash: await sha256('admin'),
        passHash: await sha256('jans2025')
      };
    }

    // ── Main login handler ──
    async function handleLogin() {
      const err     = document.getElementById('loginError');
      const btn     = document.getElementById('loginBtn');
      const spinner = document.getElementById('loginSpinner');
      const btnText = document.getElementById('loginBtnText');
      const card    = document.querySelector('.login-card');

      err.classList.remove('show');

      // Check shared rate limit (across all devices)
      btn.disabled = true;
      spinner.style.display = 'block';
      btnText.textContent = 'Verificando...';

      let rateState = await getRateState();
      if (isLocked(rateState)) {
        btn.disabled = false;
        spinner.style.display = 'none';
        btnText.textContent = 'Ingresar';
        err.querySelector('span').textContent =
          `Demasiados intentos. Espera ${remainingLockMinutes(rateState)} minuto(s).`;
        err.classList.add('show');
        return;
      }

      // Sanitize inputs
      const rawUser = sanitize(document.getElementById('loginUser').value);
      const rawPass = sanitize(document.getElementById('loginPass').value);

      if (!rawUser || !rawPass) {
        btn.disabled = false;
        spinner.style.display = 'none';
        btnText.textContent = 'Ingresar';
        err.querySelector('span').textContent = 'Completa usuario y contraseña.';
        err.classList.add('show');
        return;
      }

      try {
        // Hash the input credentials
        const [inputUserHash, inputPassHash] = await Promise.all([
          sha256(rawUser),
          sha256(rawPass)
        ]);

        // Get stored hashes
        const stored = await getStoredHashes();

        // Timing-safe comparison (both hashes always compared)
        const userOk = inputUserHash === stored.userHash;
        const passOk = inputPassHash === stored.passHash;

        // Add artificial delay to prevent timing attacks
        await new Promise(r => setTimeout(r, 400 + Math.random() * 200));

        if (userOk && passOk) {
          const authToken = await sha256(SESSION_KEY + Date.now() + Math.random());
          sessionStorage.setItem(SESSION_KEY, JSON.stringify({
            token:  authToken,
            expiry: Date.now() + (8 * 60 * 60 * 1000)  // 8 horas
          }));
          await resetAttempts(); // reset shared counter on success
          btnText.textContent = '¡Bienvenido!';
          setTimeout(() => window.location.replace('../master.html'), 400);
        } else {
          const updated = await recordFailedAttempt(rateState);
          const remaining = MAX_ATTEMPTS - (updated ? updated.count : (rateState.count + 1));
          btn.disabled = false;
          spinner.style.display = 'none';
          btnText.textContent = 'Ingresar';
          document.getElementById('loginPass').value = '';
          document.getElementById('loginPass').focus();
          err.querySelector('span').textContent = remaining > 0
            ? `Usuario o contraseña incorrectos. ${remaining} intento(s) restante(s).`
            : `Cuenta bloqueada por ${LOCK_MS/60000} minutos.`;
          err.classList.add('show');
          card.style.animation = 'none';
          card.offsetHeight;
          card.style.animation = 'shake 0.35s ease';
        }
      } catch(e) {
        btn.disabled = false;
        spinner.style.display = 'none';
        btnText.textContent = 'Ingresar';
        err.querySelector('span').textContent = 'Error interno. Intenta de nuevo.';
        err.classList.add('show');
      }
    }

    // Shake keyframe
    const _s = document.createElement('style');
    _s.textContent = `@keyframes shake {
      0%,100%{transform:translateX(0)}
      20%{transform:translateX(-8px)}
      40%{transform:translateX(8px)}
      60%{transform:translateX(-5px)}
      80%{transform:translateX(5px)}
    }`;
    document.head.appendChild(_s);

    // Enter key
    document.getElementById('loginPass').addEventListener('keydown', e => { if(e.key==='Enter') handleLogin(); });
    document.getElementById('loginUser').addEventListener('keydown', e => { if(e.key==='Enter') handleLogin(); });
  </script>

</body>
</html>
