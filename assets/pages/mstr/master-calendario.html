function showToast(msg, type='success') {

function statusLabel(s) {
  return {pending:'Pendiente',confirmed:'Confirmada',completed:'Completada',postponed:'Aplazada',cancelled:'Cancelada',approved:'Confirmada',booked:'Confirmada',rejected:'Cancelada'}[s]||s;

function statusClassQ(s) {

}
const MONTHS_ES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DAYS_ES   = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];

const CAT_LABELS  = {retratos:'Retratos',"xv-anos":"XV Años",familiares:'Familiares',"pre-boda":"Pre Boda",boda:'Boda',eventos:'Eventos',graduacion:'Graduación',gastronomia:'Gastronomía',infantiles:'Infantiles',todos:'Todas las categorías'};
async function ghPut(file, data) {
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
  const body = { message: `update ${file}`, content };
  if (state.fileSHAs[file]) body.sha = state.fileSHAs[file];
  let res = await fetch(`${GH_BASE()}/${file}`, {
    method: 'PUT',
    headers: {
      Authorization: `token ${CONFIG.GH_TOKEN}`,
      Accept: 'application/vnd.github.v3+json',
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(body)
  });

  // If we get a 409 Conflict, our SHA is stale — fetch the current one and retry once.
  if (res.status === 409) {
    try {
      const getRes = await fetch(`${GH_BASE()}/${file}`, {
        headers: { Authorization: `token ${CONFIG.GH_TOKEN}`, Accept: 'application/vnd.github.v3+json' }
      });
      if (getRes.ok) {
        const getJson = await getRes.json();
        if (getJson.sha) {
          state.fileSHAs[file] = getJson.sha;
          body.sha = getJson.sha;
          res = await fetch(`${GH_BASE()}/${file}`, {
            method: 'PUT',
            headers: {
              Authorization: `token ${CONFIG.GH_TOKEN}`,
              Accept: 'application/vnd.github.v3+json',
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(body)
          });
        }
      }
    } catch(e) { /* retry failed — return original failed response */ }
  }

  const json = await res.json();
  if (json.content) state.fileSHAs[file] = json.content.sha;
  return res.ok;
}
async function ghPutPublic(file, data) {
  const token = CONFIG.GH_TOKEN || localStorage.getItem('jans_gh_config') && JSON.parse(localStorage.getItem('jans_gh_config')).token;
  if (!token) { showToast('Configura el token de GitHub primero', 'error'); return false; }
  // First try to get the current SHA
  let sha = null;
  try {
    const getRes = await fetch(`${GH_BASE_PUBLIC()}/${file}`, {
      headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' }
    });
    if (getRes.ok) { const j = await getRes.json(); sha = j.sha; }
  } catch(e) {}
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
  const body = { message: `update ${file}`, content };
  if (sha) body.sha = sha;
  const res = await fetch(`${GH_BASE_PUBLIC()}/${file}`, {
    method: 'PUT',
    headers: {
      Authorization: `token ${token}`,
      Accept: 'application/vnd.github.v3+json',
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(body)
  });
  return res.ok;
}
let allReservas = [];
function loadReservasLocal() {
  try {
    const raw = localStorage.getItem('jans_reservas');
    if (!raw) { allReservas = []; return; }
    // Intentar parsear (puede ser JSON plano o datos encriptados)
    try { allReservas = JSON.parse(raw); } catch(e) { allReservas = []; }
  } catch(e) { allReservas = []; }
  let changed = false;
  allReservas.forEach(r => {
    if (!r.numero) { r.numero = nextNumero('WEB'); changed = true; }
    if (r.abono === undefined) { r.abono = 0; changed = true; }
  });
  if (changed) localStorage.setItem('jans_reservas', JSON.stringify(allReservas));
}
function resTotal(r) {
  const base = (r.totalManual !== undefined && r.totalManual !== null && r.totalManual !== '')
    ? (parseFloat(r.totalManual) || 0)
    : resPlanPrice(r);
  const extras        = resExtrasTotal(r);
  const personasExtra = parseFloat(r.costoPersonasExtra) || 0;
  const exterior      = parseFloat(r.costoExterior)      || 0;
  return base + extras + personasExtra + exterior;
}
function resStatusClass(s) {
  return { pending:'status-pending', confirmed:'status-approved', completed:'status-approved', declined:'status-rejected', cancelled:'status-rejected', postponed:'status-postponed' }[s] || '';
}
function resStatusLabel(s) {
  return { pending:'Pendiente', confirmed:'Confirmada', completed:'Completada', declined:'Declinada', cancelled:'Cancelada', deleted:'Eliminada', postponed:'Aplazada' }[s] || s;
}

function todayPanama() {
  return new Date(new Date().toLocaleString('en-US', { timeZone: 'America/Panama' }));
}
function todayStrPanama() {
  const d = todayPanama();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}


let calView     = 'month';
let calViewDay  = null;
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth();
let state = { calendar: {}, quotes: [] };

function loadCalendar() {
  try { state.calendar = JSON.parse(localStorage.getItem('jans_calendar') || '{}'); } catch(e) { state.calendar = {}; }
}

function getGHConfig() {
  try { return JSON.parse(localStorage.getItem('jans_gh_config') || '{}'); } catch(e) { return {}; }
}

async function fetchCalendarData() {
  const cfg = getGHConfig();
  if (!cfg.owner || !cfg.repo || !cfg.token) return;
  try {
    const r = await fetch('https://api.github.com/repos/' + cfg.owner + '/' + cfg.repo + '/contents/data/calendar.json', {
      headers: { Authorization: 'token ' + cfg.token, Accept: 'application/vnd.github.v3.json' }
    });
    if (r.ok) {
      const d = await r.json();
      state.calendar = JSON.parse(atob(d.content.replace(/\n/g,'')));
      localStorage.setItem('jans_calendar', JSON.stringify(state.calendar));
    }
  } catch(e) { console.warn('fetchCalendar error:', e); }

  // También cargar cotizaciones para mostrar en calendario
  try {
    const r2 = await fetch('https://api.github.com/repos/' + cfg.owner + '/' + cfg.repo + '/contents/data/quotes.json', {
      headers: { Authorization: 'token ' + cfg.token, Accept: 'application/vnd.github.v3.json' }
    });
    if (r2.ok) {
      const d2 = await r2.json();
      state.quotes = JSON.parse(atob(d2.content.replace(/\n/g,'')));
      localStorage.setItem('jans_quotes', JSON.stringify(state.quotes));
    }
  } catch(e) {}

  renderCalendar();
  showToast('Calendario sincronizado');
}

function evClass(status) {
  return { confirmed:'ev-confirmed', postponed:'ev-postponed', cancelled:'ev-cancelled' }[status] || 'ev-pending';
}
function getEventsForDate(ds) {
  const res  = (JSON.parse(localStorage.getItem('jans_reservas')||'[]')).filter(r=>r.fecha===ds && r.status!=='deleted');
  const quot = state.quotes.filter(q=>q.sessionDate===ds);
  const evs  = [];
  res.forEach(r  => evs.push({ name: r.nombre,         plan: r.plan||'—',   hora: r.hora||'',  horaVal: r.horaVal||0, status: r.status,   type:'res'   }));
  quot.forEach(q => evs.push({ name: q.clientName,     plan: q.plan||'—',   hora: q.sessionTime||'', horaVal: parseInt((q.sessionTime||'0').split(':')[0])||0, status: q.status, type:'quote' }));
  return evs;
}
function renderCalendar() {
  const todayStr = new Date().toISOString().split('T')[0];
  if(calView==='month')  renderMonthView(todayStr);
  else if(calView==='week') renderWeekView(todayStr);
  else if(calView==='day')  renderDayView(todayStr);
}
function renderMonthView(todayStr) {
  document.getElementById('calMonthLabel').textContent = MONTHS_ES[state.calMonth] + ' ' + state.calYear;
  document.getElementById('calSubtitle').textContent = 'Vista mensual';
  const g = document.getElementById('calGrid');
  g.innerHTML = '';
  DAYS_ES.forEach(d => { const el=document.createElement('div'); el.className='cal-dow'; el.textContent=d; g.appendChild(el); });
  const firstDay    = new Date(state.calYear, state.calMonth, 1).getDay();
  const daysInMonth = new Date(state.calYear, state.calMonth+1, 0).getDate();
  for(let i=0;i<firstDay;i++){ const el=document.createElement('div'); el.className='cal-day empty'; g.appendChild(el); }

  for(let d=1;d<=daysInMonth;d++) {
    const ds  = state.calYear+'-'+String(state.calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const st  = state.calendar[ds];
    const evs = getEventsForDate(ds);
    const el  = document.createElement('div');
    el.className = 'cal-day';
    if(ds===todayStr) el.classList.add('today');

    // st can be 'booked', 'available', or an event object {type:'event', titulo, color, ...}
    if (st && typeof st === 'object' && st.type === 'event') {
      el.classList.add('booked', 'cal-event', `ev-${st.color || 'pink'}`);
      el.title = st.titulo || 'Evento';
    } else if(st==='booked')    { el.classList.add('booked'); }
      else if(st==='available') { el.classList.add('available'); }

    // Reserva event pills (max 3)
    const pills = evs.slice(0,3).map(e =>
      `<div class="ev-pill ${evClass(e.status)}" title="${e.name} — ${e.plan}">${e.name.split(' ')[0]}</div>`
    ).join('');
    const more  = evs.length > 3 ? `<div class="ev-pill ev-pending">+${evs.length-3}</div>` : '';

    // Calendar event label (if it's an event object, show the title below the day number)
    const evLabel = (st && typeof st === 'object' && st.type === 'event')
      ? `<div style="font-size:0.6rem;color:var(--ev-color,var(--pink));overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%;line-height:1.1;margin-top:1px">${st.titulo||'Evento'}</div>`
      : '';

    el.innerHTML = `<span class="day-num">${d}</span>${evLabel}<div class="day-events">${pills}${more}</div>`;
    el.addEventListener('click', e => openCtxMenu(e, ds));
    g.appendChild(el);
  }
}
function renderWeekView(todayStr) {
  // Find Monday of current week relative to calYear/calMonth/1
  const refDate   = new Date(state.calYear, state.calMonth, 1);
  const dayOfWeek = refDate.getDay(); // 0=Sun
  const monday    = new Date(refDate); monday.setDate(refDate.getDate() - dayOfWeek);
  const days = Array.from({length:7}, (_,i) => { const d=new Date(monday); d.setDate(monday.getDate()+i); return d; });
  const startStr = days[0].toISOString().split('T')[0];
  const endStr   = days[6].toISOString().split('T')[0];
  document.getElementById('calMonthLabel').textContent = MONTHS_ES[days[0].getMonth()] + ' ' + days[0].getDate() + ' – ' + MONTHS_ES[days[6].getMonth()] + ' ' + days[6].getDate() + ', ' + days[6].getFullYear();
  document.getElementById('calSubtitle').textContent = 'Vista semanal';

  const g = document.getElementById('weekGrid'); g.innerHTML = '';

  // Header row
  const cornerEl = document.createElement('div'); cornerEl.className='week-header-cell'; g.appendChild(cornerEl);
  days.forEach(d => {
    const ds  = d.toISOString().split('T')[0];
    const el  = document.createElement('div');
    el.className = 'week-header-cell' + (ds===todayStr?' today-col':'');
    el.innerHTML = DAYS_ES[d.getDay()] + '<br><strong style="font-size:0.95rem">' + d.getDate() + '</strong>';
    g.appendChild(el);
  });

  // Hour rows
  HOURS_CAL.forEach((h, hi) => {
    const tlEl = document.createElement('div'); tlEl.className='week-time-label'; tlEl.style.cssText='display:flex;align-items:flex-start;padding:4px 8px 0 0;border-bottom:1px solid rgba(255,255,255,0.05)'; tlEl.textContent=HOUR_LABELS[hi]; g.appendChild(tlEl);
    days.forEach(d => {
      const ds  = d.toISOString().split('T')[0];
      const evs = getEventsForDate(ds).filter(e=>e.horaVal===h);
      const cell= document.createElement('div');
      cell.className = 'week-cell' + (ds===todayStr?' today-col':'');
      evs.forEach(e => {
        const pill = document.createElement('div');
        pill.className = 'week-event';
        pill.style.cssText = 'background:'+evBg(e.status)+';color:'+evColor(e.status)+(e.status==='cancelled'?';text-decoration:line-through':'');
        pill.textContent = e.name.split(' ')[0] + (e.plan ? ' · ' + e.plan.substring(0,10) : '');
        pill.title = e.name + ' — ' + e.plan + ' @ ' + e.hora;
        cell.appendChild(pill);
      });
      cell.addEventListener('click', ev => openCtxMenu(ev, ds));
      g.appendChild(cell);
    });
  });
}
function renderDayView(todayStr) {
  if(!calViewDay) calViewDay = todayStr;
  const [y,m,d] = calViewDay.split('-');
  const dateObj  = new Date(parseInt(y), parseInt(m)-1, parseInt(d));
  document.getElementById('calMonthLabel').textContent = DAYS_ES[dateObj.getDay()] + ', ' + parseInt(d) + ' de ' + MONTHS_ES[parseInt(m)-1] + ' ' + y;
  document.getElementById('calSubtitle').textContent = 'Vista diaria';

  const evs = getEventsForDate(calViewDay);
  const tl  = document.getElementById('dayTimeline'); tl.innerHTML = '';

  // ── Calendar event info banner (shown when the day has a scheduled event) ──
  const daySt = state.calendar[calViewDay];
  if (daySt && typeof daySt === 'object' && daySt.type === 'event') {
    const colorHex = { pink:'#e91e8c', blue:'#3b82f6', green:'#22c55e', amber:'#f59e0b', purple:'#a855f7' };
    const evColor  = colorHex[daySt.color] || colorHex.pink;
    const fmtH = h => { const s = h < 12 ? 'AM' : 'PM'; return `${h % 12 || 12}:00 ${s}`; };
    const blockLabel = (!daySt.blockType || daySt.blockType === 'day')
      ? 'Día completo bloqueado'
      : `Horas bloqueadas: ${fmtH(daySt.horaInicio)} – ${fmtH(daySt.horaFin)}`;
    const banner   = document.createElement('div');
    banner.style.cssText = `grid-column:1/-1;background:${evColor}18;border:1px solid ${evColor}44;border-radius:10px;padding:14px 18px;margin-bottom:14px;display:flex;align-items:flex-start;gap:12px`;
    banner.innerHTML = `
      <div style="width:36px;height:36px;border-radius:10px;background:${evColor}25;display:flex;align-items:center;justify-content:center;flex-shrink:0">
        <svg viewBox="0 0 24 24" fill="none" stroke="${evColor}" stroke-width="2" width="18" height="18"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      </div>
      <div style="flex:1;min-width:0">
        <div style="font-size:0.7rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:${evColor};margin-bottom:3px">Evento del día</div>
        <div style="font-weight:700;font-size:1rem;color:var(--white);margin-bottom:4px">${daySt.titulo || 'Evento'}</div>
        <div style="font-size:0.78rem;color:${evColor};font-weight:600;margin-bottom:${daySt.descripcion ? '4px' : '0'}">${blockLabel}</div>
        ${daySt.descripcion ? `<div style="font-size:0.82rem;color:var(--gray-l);line-height:1.5">${daySt.descripcion}</div>` : ''}
      </div>
      <button onclick="openCalEventEdit('${calViewDay}')" style="background:none;border:1px solid ${evColor}55;border-radius:8px;color:${evColor};font-family:var(--font);font-size:0.76rem;font-weight:600;padding:6px 12px;cursor:pointer;white-space:nowrap;flex-shrink:0">✏ Editar</button>
      <button onclick="openCalEventDeleteDirect('${calViewDay}')" style="background:none;border:1px solid rgba(239,68,68,0.3);border-radius:8px;color:#fca5a5;font-family:var(--font);font-size:0.76rem;font-weight:600;padding:6px 12px;cursor:pointer;white-space:nowrap;flex-shrink:0;margin-left:6px">✕ Eliminar</button>`;
    tl.appendChild(banner);
  }

  HOURS_CAL.forEach((h, hi) => {
    const tlEl = document.createElement('div'); tlEl.className='day-time-label'; tlEl.style.cssText='padding-top:14px;'; tlEl.textContent=HOUR_LABELS[hi]; tl.appendChild(tlEl);
    const cell = document.createElement('div'); cell.className='day-slot hour-block';
    const slotEvs = evs.filter(e=>e.horaVal===h);
    slotEvs.forEach(e => {
      const ev = document.createElement('div');
      ev.className = 'day-event';
      ev.style.cssText = 'background:'+evBg(e.status)+';color:'+evColor(e.status)+(e.status==='cancelled'?';text-decoration:line-through':'');
      ev.innerHTML = '<div class="de-time">'+e.hora+'</div><div class="de-name">'+e.name+'</div><div class="de-plan">'+e.plan+'</div>';
      cell.appendChild(ev);
    });
    tl.appendChild(cell);
  });

  // If no reservas/quotes show contextual message
  if(!evs.length) {
    const noEvEl = document.createElement('div');
    noEvEl.style.cssText = 'grid-column:2;padding:20px;color:var(--gray);font-size:0.88rem;';
    const daySt2 = state.calendar[calViewDay];
    const hasCalEvent = daySt2 && typeof daySt2 === 'object' && daySt2.type === 'event';
    noEvEl.textContent = hasCalEvent
      ? 'Día reservado para el evento — sin solicitudes de clientes.'
      : 'Sin reservas ni cotizaciones para este día.';
    tl.appendChild(noEvEl);
  }
}
function calNext() {
  if(calView==='month') { state.calMonth++; if(state.calMonth>11){state.calMonth=0;state.calYear++;} }
  else if(calView==='week') { state.calMonth++; if(state.calMonth>11){state.calMonth=0;state.calYear++;} }
  else if(calView==='day' && calViewDay) {
    const d = new Date(calViewDay); d.setDate(d.getDate()+1);
    calViewDay = d.toISOString().split('T')[0];
    state.calYear  = d.getFullYear();
    state.calMonth = d.getMonth();
  }
  renderCalendar();
}
function calPrev() {
  if(calView==='month') { state.calMonth--; if(state.calMonth<0){state.calMonth=11;state.calYear--;} }
  else if(calView==='week') { state.calMonth--; if(state.calMonth<0){state.calMonth=11;state.calYear--;} }
  else if(calView==='day' && calViewDay) {
    const d = new Date(calViewDay); d.setDate(d.getDate()-1);
    calViewDay = d.toISOString().split('T')[0];
    state.calYear  = d.getFullYear();
    state.calMonth = d.getMonth();
  }
  renderCalendar();
}
function calGoToday() {
  const now = new Date();
  state.calYear  = now.getFullYear();
  state.calMonth = now.getMonth();
  if(calView==='day') {
    calViewDay = now.toISOString().split('T')[0];
  }
  renderCalendar();
}
function setCalView(v) {
  calView = v;
  ['month','week','day'].forEach(x => {
    document.getElementById('calView'+x.charAt(0).toUpperCase()+x.slice(1)).style.display = x===v ? 'block' : 'none';
    document.getElementById('btnView'+x.charAt(0).toUpperCase()+x.slice(1)).classList.toggle('active', x===v);
  });
  renderCalendar();
}
async function syncCalendarPublic() {
  showToast('Sincronizando calendario...', 'success');
  try {
    const ok = await ghPutPublic('calendar.json', state.calendar);
    if (ok) showToast('Calendario publicado ✓ — visible en index y reservas');
    else    showToast('Error al sincronizar — verifica configuración GitHub', 'error');
  } catch(e) {
    showToast('Error de conexión', 'error');
  }
}
function openCalEventModal() {
  openModal('calEventActionModal');
}
async function saveCalEvent() {
  const titulo     = document.getElementById('calEvTitulo').value.trim();
  const fecha      = document.getElementById('calEvFecha').value;
  const nuevaFecha = document.getElementById('calEvNuevaFecha').value;
  const desc       = document.getElementById('calEvDesc').value.trim();
  const color      = document.querySelector('[name="calEvColor"]:checked')?.value || 'pink';
  const blockType  = document.querySelector('[name="calEvBlockType"]:checked')?.value || 'day';
  const editDs     = document.getElementById('calEvEditDs').value;

  const horaInicio = blockType === 'hours' ? parseInt(document.getElementById('calEvHoraInicio').value, 10) : null;
  const horaFin    = blockType === 'hours' ? parseInt(document.getElementById('calEvHoraFin').value,    10) : null;

  if (!titulo) { showToast('El título es obligatorio', 'error'); document.getElementById('calEvTitulo').focus(); return; }
  if (!fecha && !editDs) { showToast('La fecha es obligatoria', 'error'); document.getElementById('calEvFecha').focus(); return; }
  if (blockType === 'hours' && horaInicio >= horaFin) {
    showToast('La hora de inicio debe ser anterior a la hora de fin', 'error'); return;
  }

  const newDs = editDs ? (nuevaFecha || editDs) : fecha;

  const evObj = { type: 'event', titulo, descripcion: desc, color, blockType };
  if (blockType === 'hours') { evObj.horaInicio = horaInicio; evObj.horaFin = horaFin; }

  // If rescheduling to a different date, release the original day first
  if (editDs && newDs !== editDs) state.calendar[editDs] = 'available';

  state.calendar[newDs] = evObj;
  localStorage.setItem('jans_calendar', JSON.stringify(state.calendar));
  renderCalendar();
  closeModal('calEventFormModal');

  const ok1 = await ghPut('calendar.json', state.calendar);
  const ok2 = await ghPutPublic('calendar.json', state.calendar);

  const label = blockType === 'hours'
    ? `(${horaInicio % 12 || 12}${horaInicio < 12 ? 'AM' : 'PM'} – ${horaFin % 12 || 12}${horaFin < 12 ? 'AM' : 'PM'})`
    : '(día completo)';

  if (ok1 && ok2) {
    showToast(editDs ? (newDs !== editDs ? `Evento aplazado al ${newDs} ✓` : `Evento actualizado ${label} ✓`) : `Evento creado — bloqueado ${label} ✓`);
  } else {
    showToast('Guardado localmente — verifica GitHub en Configuración', 'error');
  }
}
async function deleteCalEvent(ds) {
  closeModal('calEventPickerModal');
  if (!ds || !state.calendar[ds] || typeof state.calendar[ds] !== 'object') return;

  const titulo = state.calendar[ds].titulo || 'este evento';
  if (!confirm(`¿Eliminar "${titulo}" (${ds}) y liberar ese día?`)) return;

  state.calendar[ds] = 'available';
  localStorage.setItem('jans_calendar', JSON.stringify(state.calendar));
  renderCalendar();

  const ok1 = await ghPut('calendar.json', state.calendar);
  const ok2 = await ghPutPublic('calendar.json', state.calendar);
  showToast(ok1 && ok2 ? `"${titulo}" eliminado — día liberado ✓` : 'Eliminado localmente — verifica GitHub', ok1 && ok2 ? 'success' : 'error');
}
function handleLogout() { sessionStorage.removeItem(SESSION_KEY); window.location.replace("../master.html"); }
document.addEventListener('DOMContentLoaded', () => {
  // Cargar datos locales
  loadCalendar();
  try { allReservas = JSON.parse(localStorage.getItem('jans_reservas') || '[]'); } catch(e) { allReservas = []; }
  try { state.quotes = JSON.parse(localStorage.getItem('jans_quotes') || '[]'); } catch(e) { state.quotes = []; }
  renderCalendar();
  // Cargar datos frescos en background
  fetchCalendarData();
});
</script>
