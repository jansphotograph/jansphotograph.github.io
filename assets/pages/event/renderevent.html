<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Evento | Jans Photograph</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/png" href="../../images/icons/JansBlackBag.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    :root {
      --pink:#e91e8c; --pink-dark:#c2176d; --pink-l:#f472b6;
      --black:#0d0d0d; --dark:#1a1a1a; --dark-mid:#232323;
      --border:rgba(255,255,255,0.08); --gray:#888; --gray-l:#aaa;
      --white:#ffffff; --green:#22c55e; --red:#ef4444;
      --font:'Inter',system-ui,sans-serif; --serif:'Playfair Display',Georgia,serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:var(--font);background:var(--black);color:var(--white);min-height:100vh;}

    /* ── Topbar ── */
    .topbar{position:fixed;top:0;left:0;right:0;height:60px;z-index:100;background:rgba(13,13,13,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;gap:16px;}
    .topbar-left{display:flex;align-items:center;gap:14px;}
    .topbar-left img{height:30px;width:auto;}
    .topbar-title{font-family:var(--serif);font-size:1rem;}
    .topbar-title span{color:var(--pink);}
    .topbar-right{display:flex;align-items:center;gap:10px;}
    .btn-back-top{display:flex;align-items:center;gap:6px;background:transparent;border:1px solid var(--border);color:var(--gray-l);font-family:var(--font);font-size:0.82rem;padding:7px 14px;border-radius:8px;cursor:pointer;transition:all 0.2s;}
    .btn-back-top:hover{border-color:var(--pink);color:var(--white);}

    /* ── Main ── */
    main{padding:88px 28px 80px;max-width:900px;margin:0 auto;}

    .page-header{margin-bottom:28px;}
    .page-header h1{font-family:var(--serif);font-size:clamp(1.4rem,3vw,1.9rem);font-weight:700;margin-bottom:4px;}
    .page-header h1 span{color:var(--pink);}
    .page-header p{color:var(--gray-l);font-size:0.88rem;}

    /* ── Cards ── */
    .card{background:var(--dark);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:20px;}
    .card-title{display:flex;align-items:center;gap:10px;font-size:1rem;font-weight:700;color:var(--white);margin-bottom:20px;}
    .card-title svg{color:var(--pink);flex-shrink:0;}

    /* ── Form fields ── */
    .field{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
    .field label{font-size:0.78rem;font-weight:600;color:var(--gray-l);letter-spacing:0.04em;text-transform:uppercase;}
    .field input,.field select,.field textarea{background:var(--dark-mid,#232323);border:1px solid var(--border);border-radius:9px;color:var(--white);font-family:var(--font);font-size:0.9rem;padding:10px 14px;outline:none;transition:border-color 0.2s;width:100%;}
    .field input:focus,.field select:focus,.field textarea:focus{border-color:rgba(233,30,140,0.5);}
    .field textarea{resize:vertical;min-height:80px;}
    .field select option{background:var(--dark);}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}

    /* ── Category selector ── */
    .cat-row{display:flex;align-items:flex-end;gap:8px;}
    .cat-row select{flex:1;}
    .btn-cat-new{background:rgba(233,30,140,0.1);border:1px solid rgba(233,30,140,0.3);color:var(--pink-l);font-family:var(--font);font-size:0.8rem;font-weight:600;padding:10px 14px;border-radius:9px;cursor:pointer;white-space:nowrap;transition:all 0.2s;flex-shrink:0;}
    .btn-cat-new:hover{background:rgba(233,30,140,0.2);}

    /* ── Attendees table ── */
    .table-wrap{overflow-x:auto;}
    table{width:100%;border-collapse:collapse;font-size:0.85rem;}
    th{color:var(--gray-l);font-size:0.72rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;padding:10px 12px;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap;}
    td{padding:8px 6px;border-bottom:1px solid rgba(255,255,255,0.04);vertical-align:middle;}
    td input,td select{background:var(--dark-mid,#232323);border:1px solid transparent;border-radius:7px;color:var(--white);font-family:var(--font);font-size:0.85rem;padding:7px 10px;outline:none;width:100%;transition:border-color 0.18s;}
    td input:focus,td select:focus{border-color:rgba(233,30,140,0.4);}
    td select option{background:var(--dark);}
    .row-num{color:var(--gray);font-size:0.78rem;font-weight:700;padding:0 8px;white-space:nowrap;}
    .btn-del-row{background:none;border:none;color:var(--gray);cursor:pointer;font-size:1rem;padding:4px 8px;border-radius:6px;transition:all 0.18s;}
    .btn-del-row:hover{color:#fca5a5;background:rgba(239,68,68,0.08);}
    .btn-add-row{display:flex;align-items:center;gap:8px;background:none;border:1px dashed rgba(255,255,255,0.15);border-radius:9px;color:var(--gray-l);font-family:var(--font);font-size:0.85rem;padding:10px 16px;cursor:pointer;width:100%;margin-top:10px;transition:all 0.2s;}
    .btn-add-row:hover{border-color:rgba(233,30,140,0.4);color:var(--pink-l);}

    /* ── Action buttons ── */
    .action-bar{display:flex;gap:12px;flex-wrap:wrap;margin-top:28px;}
    .btn{display:inline-flex;align-items:center;gap:8px;border-radius:10px;font-family:var(--font);font-weight:600;font-size:0.88rem;padding:11px 20px;border:none;cursor:pointer;transition:all 0.2s;}
    .btn-pink{background:var(--pink);color:var(--white);}
    .btn-pink:hover{background:var(--pink-dark);}
    .btn-outline{background:transparent;border:1px solid var(--border);color:var(--white);}
    .btn-outline:hover{border-color:var(--pink);}
    .btn-ghost{background:transparent;border:1px solid var(--border);color:var(--gray-l);}
    .btn-ghost:hover{border-color:rgba(255,255,255,0.2);color:var(--white);}

    /* ── Overlays / Modals ── */
    .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:300;align-items:center;justify-content:center;}
    .overlay.open{display:flex;}
    .modal{background:var(--dark);border:1px solid var(--border);border-radius:16px;padding:28px;width:90%;max-width:400px;}
    .modal h3{font-size:1.1rem;margin-bottom:16px;}
    .modal-btns{display:flex;gap:10px;margin-top:20px;justify-content:flex-end;}

    /* ── Toast ── */
    .toast{position:fixed;bottom:24px;right:24px;background:var(--dark-mid,#232323);border:1px solid var(--border);border-radius:10px;padding:12px 18px;font-size:0.85rem;display:flex;align-items:center;gap:10px;z-index:9999;opacity:0;transform:translateY(8px);transition:all 0.25s;pointer-events:none;}
    .toast.show{opacity:1;transform:none;}
    .toast.success{border-color:rgba(34,197,94,0.4);}
    .toast.error{border-color:rgba(239,68,68,0.4);}
    .toast-dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0;}
    .toast.error .toast-dot{background:var(--red);}

    @media(max-width:600px){
      main{padding:78px 14px 70px;}
      .form-row{grid-template-columns:1fr;}
      .action-bar{flex-direction:column;}
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-left">
      <img src="../../images/icons/Janssocialmedialogo.png" alt="Logo" />
      <span class="topbar-title">Jans <span>Photograph</span></span>
    </div>
    <div class="topbar-right">
      <button class="btn-back-top" onclick="window.location.href='calltoevent.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><polyline points="15 18 9 12 15 6"/></svg>
        Eventos
      </button>
    </div>
  </div>

  <main>
    <div class="page-header">
      <h1 id="pageTitle">Nuevo <span>Evento</span></h1>
      <p id="pageSubtitle">Completa los datos del evento y registra a los asistentes.</p>
    </div>

    <!-- ── Event info ── -->
    <div class="card">
      <div class="card-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Información del Evento
      </div>

      <div class="field">
        <label>Título del evento *</label>
        <input type="text" id="evTitulo" placeholder="Ej. Boda García — Recepción" maxlength="120" />
      </div>

      <div class="form-row">
        <div class="field">
          <label>Fecha *</label>
          <input type="date" id="evFecha" />
        </div>
        <div class="field">
          <label>Categoría</label>
          <div class="cat-row">
            <select id="evCategoria">
              <option value="">— Sin categoría —</option>
            </select>
            <button class="btn-cat-new" onclick="openCatModal()">+ Nueva categoría</button>
          </div>
        </div>
      </div>

      <div class="field">
        <label>Descripción</label>
        <textarea id="evDescripcion" placeholder="Detalles adicionales del evento..."></textarea>
      </div>
    </div>

    <!-- ── Attendees ── -->
    <div class="card">
      <div class="card-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Asistentes
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Nombre</th>
              <th>Cédula</th>
              <th>Tipo de Plan</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="attendeesBody"></tbody>
        </table>
      </div>
      <button class="btn-add-row" onclick="addRow()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Añadir asistente
      </button>
    </div>

    <div class="action-bar">
      <button class="btn btn-pink" onclick="saveEvent()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/></svg>
        Guardar Evento
      </button>
      <button class="btn btn-outline" onclick="exportPDF()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Exportar PDF
      </button>
      <button class="btn btn-ghost" onclick="window.location.href='calltoevent.html'">Cancelar</button>
    </div>
  </main>

  <!-- ── Category modal ── -->
  <div class="overlay" id="catOverlay">
    <div class="modal">
      <h3>Gestionar categorías</h3>
      <div id="catList" style="display:flex;flex-direction:column;gap:8px;max-height:260px;overflow-y:auto;margin-bottom:16px"></div>
      <div class="field">
        <label>Nueva categoría</label>
        <input type="text" id="catInput" placeholder="Ej. Boda, Graduación, Corporativo..." maxlength="60" onkeydown="if(event.key==='Enter')addCategory()" />
      </div>
      <div class="modal-btns">
        <button class="btn btn-ghost" onclick="closeCatModal()">Cerrar</button>
        <button class="btn btn-pink" onclick="addCategory()">Añadir</button>
      </div>
    </div>
  </div>

  <!-- ── Toast ── -->
  <div class="toast" id="toast">
    <div class="toast-dot"></div>
    <span id="toastMsg"></span>
  </div>

  <script>
    // ── Auth guard ── (soporta formato legacy 'true' y nuevo JSON con token)
    (function() {
      const raw = sessionStorage.getItem('jans_master_auth');
      if (!raw) { window.location.replace('../auth/auth.html'); return; }
      if (raw === 'true') return; // legacy
      try {
        const s = JSON.parse(raw);
        if (!s || !s.expiry || s.expiry < Date.now()) {
          sessionStorage.removeItem('jans_master_auth');
          window.location.replace('../auth/auth.html');
        }
        // Sesión válida — continuar (no verificamos fingerprint aquí para evitar falsos positivos)
      } catch(e) {
        window.location.replace('../auth/auth.html');
      }
    })();

    // ── Config ──
    const LS_CFG    = 'jans_gh_config';
    const LS_ENC    = 'jans_gh_token_enc';
    const EVENTS_FILE = 'events.json';
    const CATS_KEY  = 'jans_event_categories';

    function getConfig() {
      const cfg = JSON.parse(localStorage.getItem(LS_CFG) || '{}');
      return { owner: cfg.owner || '', repo: cfg.repo || '' };
    }

    async function getToken() {
      const enc = localStorage.getItem(LS_ENC);
      if (!enc) return null;
      try {
        const { iv, ct } = JSON.parse(enc);
        const keyMaterial = await crypto.subtle.importKey('raw', new TextEncoder().encode(
          (navigator.userAgent + location.hostname).slice(0, 32).padEnd(32,'x')), 'AES-GCM', false, ['decrypt']);
        const pt = await crypto.subtle.decrypt({ name:'AES-GCM', iv: Uint8Array.from(atob(iv),c=>c.charCodeAt(0)) },
          keyMaterial, Uint8Array.from(atob(ct), c=>c.charCodeAt(0)));
        return new TextDecoder().decode(pt);
      } catch(e) { return null; }
    }

    let fileSHAs = {};

    async function ghGet(file) {
      const { owner, repo } = getConfig();
      if (!owner || !repo) return null;
      const token = await getToken();
      if (!token) return null;
      const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${file}`,
        { headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' } });
      if (!res.ok) return null;
      const j = await res.json();
      fileSHAs[file] = j.sha;
      return JSON.parse(atob(j.content.replace(/\n/g, '')));
    }

    async function ghPut(file, data) {
      const { owner, repo } = getConfig();
      const token = await getToken();
      if (!owner || !repo || !token) return false;
      const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
      const body = { message: `update ${file}`, content };
      if (fileSHAs[file]) body.sha = fileSHAs[file];
      const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${file}`,
        { method: 'PUT', headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json', 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      const j = await res.json();
      if (j.content) fileSHAs[file] = j.content.sha;
      return res.ok;
    }

    // ── Toast ──
    let toastTimer;
    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      document.getElementById('toastMsg').textContent = msg;
      t.className = `toast ${type} show`;
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 3500);
    }

    // ── URL params ──
    const params  = new URLSearchParams(location.search);
    const editId  = params.get('id');
    let events    = [];
    let planTypes = [];

    // ── Categories ──
    function loadCategories() {
      try { return JSON.parse(localStorage.getItem(CATS_KEY) || '[]'); } catch(e) { return []; }
    }
    function saveCategories(cats) {
      localStorage.setItem(CATS_KEY, JSON.stringify(cats));
    }
    function populateCatSelect() {
      const cats = loadCategories();
      const sel = document.getElementById('evCategoria');
      const current = sel.value;
      sel.innerHTML = '<option value="">— Sin categoría —</option>' +
        cats.map(c => `<option value="${c}">${c}</option>`).join('');
      if (current) sel.value = current;
    }
    function renderCatList() {
      const cats = loadCategories();
      const el   = document.getElementById('catList');
      if (!cats.length) {
        el.innerHTML = '<div style="color:var(--gray);font-size:0.84rem">Sin categorías aún.</div>';
        return;
      }
      el.innerHTML = cats.map((c, i) => `
        <div style="display:flex;align-items:center;gap:8px;background:var(--dark-mid,#232323);border-radius:8px;padding:8px 12px;font-size:0.86rem">
          <span style="flex:1">${c}</span>
          <button onclick="deleteCategory(${i})" style="background:none;border:none;color:var(--gray);cursor:pointer;font-size:0.9rem" title="Eliminar">✕</button>
        </div>`).join('');
    }
    function openCatModal() {
      renderCatList();
      document.getElementById('catOverlay').classList.add('open');
    }
    function closeCatModal() {
      document.getElementById('catOverlay').classList.remove('open');
    }
    function addCategory() {
      const input = document.getElementById('catInput');
      const val   = input.value.trim();
      if (!val) return;
      const cats = loadCategories();
      if (cats.includes(val)) { showToast('Esa categoría ya existe', 'error'); return; }
      cats.push(val);
      saveCategories(cats);
      input.value = '';
      renderCatList();
      populateCatSelect();
      document.getElementById('evCategoria').value = val;
    }
    function deleteCategory(i) {
      const cats = loadCategories();
      cats.splice(i, 1);
      saveCategories(cats);
      renderCatList();
      populateCatSelect();
    }

    // ── Plan types ──
    function loadPlanTypes() {
      try {
        const services = JSON.parse(localStorage.getItem('jans_serv_adicionales') || '{}');
        const publicPlans = JSON.parse(localStorage.getItem('jans_planes') || '[]');
        const planNames = publicPlans.map(p => p.nombre || p.name).filter(Boolean);
        const extras = (services.impresiones || []).map(s => s.nombre).filter(Boolean);
        planTypes = [...new Set([...planNames, ...extras])];
      } catch(e) { planTypes = []; }
    }

    // ── Attendees rows ──
    let rowCount = 0;
    function addRow(nombre = '', cedula = '', plan = '') {
      rowCount++;
      const tbody = document.getElementById('attendeesBody');
      const tr    = document.createElement('tr');
      tr.id       = `row-${rowCount}`;
      const planOptions = planTypes.map(p => `<option value="${p}" ${p===plan?'selected':''}>${p}</option>`).join('');
      tr.innerHTML = `
        <td><span class="row-num">${tbody.rows.length + 1}</span></td>
        <td><input type="text" placeholder="Nombre completo" value="${nombre}" /></td>
        <td><input type="text" placeholder="0-000-0000" value="${cedula}" style="max-width:130px" /></td>
        <td>
          <select>
            <option value="">— Seleccionar —</option>
            ${planOptions}
          </select>
        </td>
        <td><button class="btn-del-row" onclick="deleteRow('${tr.id}')" title="Eliminar fila">✕</button></td>`;
      tbody.appendChild(tr);
      renumberRows();
    }
    function deleteRow(id) {
      document.getElementById(id)?.remove();
      renumberRows();
    }
    function renumberRows() {
      document.querySelectorAll('#attendeesBody .row-num').forEach((el, i) => el.textContent = i + 1);
    }
    function getAttendees() {
      return Array.from(document.querySelectorAll('#attendeesBody tr')).map(tr => {
        const inputs = tr.querySelectorAll('input, select');
        return {
          nombre: inputs[0]?.value.trim() || '',
          cedula: inputs[1]?.value.trim() || '',
          plan:   inputs[2]?.value.trim() || '',
        };
      }).filter(a => a.nombre || a.cedula);
    }

    // ── Load event for editing ──
    async function initPage() {
      loadPlanTypes();
      populateCatSelect();

      if (editId) {
        document.getElementById('pageTitle').innerHTML = 'Editar <span style="color:var(--pink)">Evento</span>';
        document.getElementById('pageSubtitle').textContent = 'Modifica los datos del evento.';
        events = await ghGet(EVENTS_FILE) || [];
        const ev = events.find(e => e.id === editId);
        if (ev) {
          document.getElementById('evTitulo').value      = ev.titulo      || '';
          document.getElementById('evFecha').value       = ev.fecha       || '';
          document.getElementById('evCategoria').value   = ev.categoria   || '';
          document.getElementById('evDescripcion').value = ev.descripcion || '';
          (ev.asistentes || []).forEach(a => addRow(a.nombre, a.cedula, a.plan));
        } else {
          showToast('Evento no encontrado', 'error');
        }
      } else {
        events = await ghGet(EVENTS_FILE) || [];
        if (!document.querySelectorAll('#attendeesBody tr').length) addRow();
      }
    }

    // ── Save ──
    function genId() { return 'ev_' + Date.now() + '_' + Math.random().toString(36).slice(2,6); }

    async function saveEvent() {
      const titulo = document.getElementById('evTitulo').value.trim();
      const fecha  = document.getElementById('evFecha').value;
      if (!titulo) { showToast('El título es obligatorio', 'error'); document.getElementById('evTitulo').focus(); return; }
      if (!fecha)  { showToast('La fecha es obligatoria', 'error');  document.getElementById('evFecha').focus();  return; }

      const ev = {
        id:          editId || genId(),
        titulo,
        fecha,
        categoria:   document.getElementById('evCategoria').value,
        descripcion: document.getElementById('evDescripcion').value.trim(),
        asistentes:  getAttendees(),
        updatedAt:   new Date().toISOString(),
      };

      if (editId) {
        const idx = events.findIndex(e => e.id === editId);
        if (idx >= 0) events[idx] = ev; else events.push(ev);
      } else {
        events.push(ev);
      }

      const ok = await ghPut(EVENTS_FILE, events);
      if (ok) {
        showToast('Evento guardado ✓');
        setTimeout(() => window.location.href = 'calltoevent.html', 1000);
      } else {
        showToast('No se pudo guardar — verifica GitHub en Configuración', 'error');
      }
    }

    // ── PDF Export ──
    async function exportPDF() {
      const titulo = document.getElementById('evTitulo').value.trim() || 'Sin título';
      const fecha  = document.getElementById('evFecha').value;
      const categoria = document.getElementById('evCategoria').value;
      const descripcion = document.getElementById('evDescripcion').value.trim();
      const asistentes = getAttendees();
      const eventId = editId || 'BORRADOR';

      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ unit: 'mm', format: 'a4' });

      const W = 210, margin = 14;
      let y = 0;

      // ─── HEADER (same style as invoice) ───
      doc.setFillColor(13, 13, 13);
      doc.rect(0, 0, W, 38, 'F');
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(18);
      doc.setTextColor(233, 30, 140);
      doc.text('JANS', margin, 16);
      doc.setTextColor(255, 255, 255);
      doc.text(' PHOTOGRAPH', margin + 20, 16);
      doc.setFontSize(8);
      doc.setFont('helvetica', 'normal');
      doc.setTextColor(170, 170, 170);
      doc.text('Fotografía Profesional — Panamá', margin, 22);
      doc.text('+507 6862-2402  |  jansphotograph.contact@gmail.com', margin, 27);

      // Right side: event label
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(11);
      doc.setTextColor(255, 255, 255);
      doc.text(`EVENTO #${eventId.toUpperCase()}`, W - margin, 16, { align: 'right' });
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(8);
      doc.setTextColor(233, 30, 140);
      doc.text('Control de Evento', W - margin, 22, { align: 'right' });
      if (fecha) {
        const fechaFmt = new Date(fecha + 'T00:00:00').toLocaleDateString('es-PA', { day: 'numeric', month: 'long', year: 'numeric' });
        doc.setTextColor(170, 170, 170);
        doc.text(fechaFmt, W - margin, 27, { align: 'right' });
      }

      // Pink bottom border on header
      doc.setFillColor(233, 30, 140);
      doc.rect(0, 36.5, W, 1, 'F');
      y = 48;

      // ─── EVENT DETAILS BOX ───
      doc.setFillColor(26, 26, 26);
      doc.setDrawColor(50, 50, 50);
      doc.roundedRect(margin, y, W - margin * 2, categoria ? 30 : 22, 3, 3, 'FD');
      y += 7;
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(9);
      doc.setTextColor(233, 30, 140);
      doc.text('TÍTULO DEL EVENTO', margin + 5, y);
      y += 5;
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(12);
      doc.setTextColor(255, 255, 255);
      doc.text(titulo, margin + 5, y);
      if (categoria) {
        y += 6;
        doc.setFont('helvetica', 'normal');
        doc.setFontSize(8);
        doc.setTextColor(170, 170, 170);
        doc.text(`Categoría: ${categoria}`, margin + 5, y);
      }
      y += 12;

      if (descripcion) {
        y += 2;
        doc.setFont('helvetica', 'italic');
        doc.setFontSize(8.5);
        doc.setTextColor(170, 170, 170);
        const descLines = doc.splitTextToSize(descripcion, W - margin * 2 - 2);
        doc.text(descLines, margin, y);
        y += descLines.length * 4 + 4;
      }

      // ─── ATTENDEES TABLE ───
      y += 4;
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(9);
      doc.setTextColor(233, 30, 140);
      doc.text('LISTA DE ASISTENTES', margin, y);
      y += 5;

      // Table header
      const COL = {
        num:   { x: margin,      w: 10 },
        nom:   { x: margin + 10, w: 55 },
        ced:   { x: margin + 65, w: 35 },
        plan:  { x: margin + 100, w: 45 },
        chk:   { x: margin + 145, w: 15 },
        firma: { x: margin + 160, w: W - margin - 160 },
      };

      doc.setFillColor(26, 26, 26);
      doc.setDrawColor(50, 50, 50);
      doc.rect(margin, y, W - margin * 2, 7, 'FD');
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(7);
      doc.setTextColor(150, 150, 150);
      doc.text('#',       COL.num.x  + 2,     y + 4.5);
      doc.text('NOMBRE',  COL.nom.x  + 2,     y + 4.5);
      doc.text('CÉDULA',  COL.ced.x  + 2,     y + 4.5);
      doc.text('PLAN',    COL.plan.x + 2,     y + 4.5);
      doc.text('✓',       COL.chk.x  + COL.chk.w/2 - 2, y + 4.5);
      doc.text('FIRMA',   COL.firma.x + 2,    y + 4.5);
      y += 7;

      // Rows (or 15 blank rows if no attendees)
      const rows = asistentes.length ? asistentes : Array.from({ length: 15 }, () => ({ nombre:'', cedula:'', plan:'' }));
      rows.forEach((a, i) => {
        if (y > 270) { doc.addPage(); y = 20; }
        const rowH = 9;
        const shade = i % 2 === 1;
        if (shade) { doc.setFillColor(22, 22, 22); doc.setDrawColor(50, 50, 50); doc.rect(margin, y, W - margin * 2, rowH, 'FD'); }
        else        { doc.setDrawColor(50, 50, 50); doc.rect(margin, y, W - margin * 2, rowH, 'D'); }

        doc.setFont('helvetica', 'normal');
        doc.setFontSize(8);
        doc.setTextColor(220, 220, 220);
        doc.text(String(i + 1), COL.num.x + 2, y + 6);
        if (a.nombre) doc.text(doc.splitTextToSize(a.nombre, COL.nom.w - 4)[0], COL.nom.x + 2, y + 6);
        if (a.cedula) doc.text(a.cedula, COL.ced.x + 2, y + 6);
        if (a.plan)   doc.text(doc.splitTextToSize(a.plan, COL.plan.w - 4)[0], COL.plan.x + 2, y + 6);

        // Checkbox square (empty, to check by hand)
        const cbx = COL.chk.x + COL.chk.w / 2 - 3;
        doc.setDrawColor(180, 180, 180);
        doc.rect(cbx, y + 2, 5, 5);

        // Signature line
        doc.setDrawColor(100, 100, 100);
        doc.line(COL.firma.x + 3, y + rowH - 2, COL.firma.x + COL.firma.w - 5, y + rowH - 2);

        y += rowH;
      });

      // Footer
      y += 8;
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(7.5);
      doc.setTextColor(100, 100, 100);
      doc.text(`Generado: ${new Date().toLocaleDateString('es-PA')} — Jans Photograph | +507 6862-2402`, W / 2, y, { align: 'center' });

      doc.save(`Evento_${titulo.replace(/[^a-zA-Z0-9]/g, '_')}_${eventId}.pdf`);
      showToast('PDF generado ✓');
    }

    // ── Init ──
    initPage();
  </script>
</body>
</html>
