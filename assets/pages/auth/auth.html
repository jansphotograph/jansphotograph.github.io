<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acceso — Jans Photograph</title>
  <link rel="icon" type="image/png" href="../../images/icons/JansBlackBag.png" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink:   #c71e5f;
      --pink-l: #e91e8c;
      --black:  #0d0d0d;
      --dark:   #141414;
      --panel:  #1c1c1c;
      --border: rgba(255,255,255,0.07);
      --gray:   #666;
      --gray-l: #999;
      --white:  #ffffff;
      --red:    #ef4444;
      --font:   'Inter', system-ui, sans-serif;
      --serif:  'Playfair Display', Georgia, serif;
      --radius: 12px;
      --shadow: 0 8px 32px rgba(0,0,0,0.45);
    }

    html, body {
      height: 100%;
      background: radial-gradient(ellipse at 50% 40%, rgba(199,30,95,0.12) 0%, transparent 65%), var(--black);
      color: var(--white);
      font-family: var(--font);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .login-card {
      width: 100%;
      max-width: 400px;
      margin: 24px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 40px;
      box-shadow: var(--shadow);
      animation: fadeUp 0.35s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .login-logo {
      text-align: center;
      margin-bottom: 36px;
    }
    .login-logo img {
      height: 60px;
      width: auto;
      margin: 0 auto 14px;
      display: block;
    }
    .login-logo h1 {
      font-family: var(--serif);
      font-size: 1.45rem;
      color: var(--white);
    }
    .login-logo h1 span { color: var(--pink-l); }
    .login-logo p {
      font-size: 0.75rem;
      color: var(--gray-l);
      margin-top: 5px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--gray-l);
      margin-bottom: 8px;
    }
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      background: var(--dark);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--white);
      font-size: 0.95rem;
      font-family: var(--font);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-group input:focus {
      border-color: var(--pink);
      box-shadow: 0 0 0 3px rgba(199,30,95,0.12);
    }

    .login-error {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 9px;
      padding: 11px 15px;
      font-size: 0.84rem;
      color: #fca5a5;
      margin-bottom: 18px;
      display: none;
      align-items: center;
      gap: 8px;
    }
    .login-error.show { display: flex; }

    .btn-login {
      width: 100%;
      padding: 13px;
      background: var(--pink);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font);
      transition: background 0.2s, transform 0.15s, opacity 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-login:hover   { background: var(--pink-l); transform: translateY(-1px); }
    .btn-login:active  { transform: translateY(0); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .btn-login .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 24px;
      font-size: 0.8rem;
      color: var(--gray);
      text-decoration: none;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--gray-l); }
    .back-link svg { vertical-align: middle; margin-right: 4px; }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="login-logo">
      <img src="../../images/icons/Janssocialmedialogo.png" alt="Jans Photograph Logo" />
      <h1>Jans <span>Photograph</span></h1>
      <p>Panel de Administración</p>
    </div>

    <div class="login-error" id="loginError">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      Usuario o contraseña incorrectos.
    </div>

    <div class="form-group">
      <label>Usuario</label>
      <input type="text" id="loginUser" placeholder="admin" autocomplete="username" />
    </div>

    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password" />
    </div>

    <button class="btn-login" id="loginBtn" onclick="handleLogin()">
      <div class="spinner" id="loginSpinner"></div>
      <span id="loginBtnText">Ingresar</span>
    </button>

    <a class="back-link" href="../../../index.html">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      Volver al inicio
    </a>
  </div>

  <script>
    // ── Credenciales — se pueden cambiar desde Master → Configuración ──
    const _override = JSON.parse(localStorage.getItem('jans_auth_override') || 'null');
    const AUTH_USER = _override?.user || 'admin';
    const AUTH_PASS = _override?.pass || 'jans2025';
    const SESSION_KEY = 'jans_master_auth';

    // Si ya está autenticado, redirigir directo al master
    if (sessionStorage.getItem(SESSION_KEY) === 'true') {
      window.location.replace('../master.html');
    }

    function handleLogin() {
      const u   = document.getElementById('loginUser').value.trim();
      const p   = document.getElementById('loginPass').value;
      const err = document.getElementById('loginError');
      const btn = document.getElementById('loginBtn');
      const spinner = document.getElementById('loginSpinner');
      const btnText = document.getElementById('loginBtnText');

      err.classList.remove('show');

      if (u === AUTH_USER && p === AUTH_PASS) {
        // Mostrar spinner
        btn.disabled = true;
        spinner.style.display = 'block';
        btnText.textContent = 'Verificando...';
        // Guardar sesión y redirigir
        sessionStorage.setItem(SESSION_KEY, 'true');
        setTimeout(() => { window.location.replace('../master.html'); }, 600);
      } else {
        err.classList.add('show');
        document.getElementById('loginPass').value = '';
        document.getElementById('loginPass').focus();
        // Shake animation
        const card = document.querySelector('.login-card');
        card.style.animation = 'none';
        card.offsetHeight; // reflow
        card.style.animation = 'shake 0.35s ease';
      }
    }

    // Shake keyframe
    const style = document.createElement('style');
    style.textContent = `@keyframes shake {
      0%,100%{transform:translateX(0)}
      20%{transform:translateX(-8px)}
      40%{transform:translateX(8px)}
      60%{transform:translateX(-5px)}
      80%{transform:translateX(5px)}
    }`;
    document.head.appendChild(style);

    // Enter key
    document.getElementById('loginPass').addEventListener('keydown', e => { if(e.key==='Enter') handleLogin(); });
    document.getElementById('loginUser').addEventListener('keydown', e => { if(e.key==='Enter') handleLogin(); });
  </script>

</body>
</html>
